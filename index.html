<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet & Planner Creator v10.9 (Strict Gatekeeper)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        body { 
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 40%),
                        #030712;
            color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
        }
        .glass-panel { background: rgba(17, 24, 39, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); }
        .floating-paper { background: #ffffff; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2 relative z-10">
        
        <div class="lg:col-span-5 glass-panel p-5 rounded-3xl space-y-4 max-h-[88vh] overflow-y-auto custom-scrollbar">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3">
                <div>
                    <h1 id="appMainTitle" class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-pink-400 to-amber-300 bg-clip-text text-transparent uppercase">WORKSHEET STUDIO</h1>
                    <p id="appSubTitle" class="text-[11px] text-gray-400 font-medium tracking-wide mt-0.5">by. koh Ojiek</p>
                </div>
                <div id="statusBadge" class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold tracking-wide">DEMO MODE ACTIVE</div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl border-l-4 border-l-indigo-500/60 space-y-3">
                <label class="text-[11px] text-indigo-400 font-bold uppercase block"><i class="fa-solid fa-keyhole mr-1"></i> Mode Aktivasi Lisensi</label>
                <div class="grid grid-cols-3 gap-1.5 text-[10px] font-bold">
                    <button type="button" id="btnModeDemo" onclick="switchLicenseMode('demo')" class="bg-indigo-600 text-white py-2 rounded-xl transition-all">Demo Mode</button>
                    <button type="button" id="btnModePersonal" onclick="switchLicenseMode('personal')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">Personal Use</button>
                    <button type="button" id="btnModeMrr" onclick="switchLicenseMode('mrr')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">MRR Master</button>
                </div>

                <div id="keyInputContainer" class="hidden space-y-2 pt-1 border-t border-gray-800/60">
                    <label id="keyInputLabel" class="text-[10px] text-gray-400 block">Masukkan Kunci Lisensi:</label>
                    <div class="flex gap-2">
                        <input type="password" id="configPersonalKey" placeholder="••••••••••••" class="flex-1 bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white tracking-widest outline-none font-mono uppercase">
                        <button type="button" onclick="prosesValidasiTombolKlik()" class="bg-indigo-600 text-white font-bold px-4 py-1.5 rounded-xl text-xs">Aktifkan</button>
                    </div>
                </div>

                <div id="adminMasterPanel" class="hidden border-t border-gray-800/60 pt-3 space-y-2.5 bg-amber-500/5 p-2.5 rounded-xl border border-amber-500/20">
                    <label class="text-[10px] text-amber-400 font-bold uppercase block"><i class="fa-solid fa-sliders mr-1"></i> Admin Master Control Tower (Secure Logged In)</label>
                    
                    <div class="grid grid-cols-2 gap-2 border-b border-gray-800/50 pb-2">
                        <div class="space-y-1">
                            <span class="text-[9px] text-gray-400 block">Set Kunci Personal Baru:</span>
                            <input type="text" id="masterPersonalSetup" placeholder="Default: AKUANAKPINTAR" class="w-full bg-gray-950/60 border border-gray-800 rounded-lg px-2 py-1 text-[10px] text-white outline-none font-mono uppercase">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[9px] text-gray-400 block">Set Kunci MRR Baru:</span>
                            <input type="text" id="masterMrrSetup" placeholder="Default: MASTERPRO2026" class="w-full bg-gray-950/60 border border-gray-800 rounded-lg px-2 py-1 text-[10px] text-white outline-none font-mono uppercase">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <span class="text-[9px] text-gray-400 block">Kustom Judul Atas:</span>
                            <input type="text" id="customTitleInput" placeholder="WORKSHEET STUDIO" class="w-full bg-gray-950/60 border border-gray-800 rounded-lg px-2 py-1 text-[10px] text-white outline-none font-medium">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[9px] text-gray-400 block">Kustom Sub-Judul:</span>
                            <input type="text" id="customSubInput" placeholder="by. koh Ojiek" class="w-full bg-gray-950/60 border border-gray-800 rounded-lg px-2 py-1 text-[10px] text-white outline-none font-medium">
                        </div>
                    </div>

                    <button type="button" onclick="simpanKunciMasterToko()" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 text-gray-950 font-extrabold text-[10px] py-1.5 rounded-lg uppercase tracking-wide"><i class="fa-solid fa-floppy-disk mr-1"></i> Simpan Konfigurasi Toko</button>
                    <button type="button" onclick="tutupPanelAdminEkstra()" class="w-full bg-gray-900 text-gray-400 text-[9px] py-1 rounded-md">Keluar & Kunci Panel Admin</button>
                </div>

                <div class="border-t border-gray-800/60 pt-2.5 flex flex-col gap-1.5">
                    <button type="button" onclick="resetPerangkatSaja()" class="w-full bg-gray-900 text-rose-400 border border-gray-800 text-[10px] py-1 rounded-lg"><i class="fa-solid fa-rotate-left mr-1"></i> Bersihkan Lisensi & Kunci Ulang Perangkat Ini</button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Kategori Modul Aktivitas Anak</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-950/60 border border-gray-800 focus:border-indigo-500 rounded-xl px-3 py-2 text-xs text-gray-200 outline-none font-medium">
                    <optgroup label="🎨 Modul Mewarnai Tematik">
                        <option value="mewarnai_hewan">🎨 Mewarnai Ragam Hebat Hewan Lucu</option>
                        <option value="mewarnai_buah">🍓 Mewarnai Buah-Buahan Segar</option>
                        <option value="mewarnai_kendaraan">🚗 Mewarnai Aneka Transportasi & Mobil</option>
                        <option value="mewarnai_dino">🦖 Mewarnai Petualangan Dunia Dinosaurus</option>
                    </optgroup>
                    <optgroup label="✍️ Modul Tracing & Menulis Dasar">
                        <option value="trace_alphabet">🇬🇧 Tracing Alphabet Seru (Huruf A-Z)</option>
                        <option value="trace_angka">🔢 Tracing Angka Matematika Dasar (1-20)</option>
                        <option value="hijaiyah" selected>🕌 Menulis & Tracing Huruf Hijaiyah</option>
                        <option value="belajar_bentuk">📐 Mengenal & Tracing Bentuk Geometri</option>
                    </optgroup>
                    <optgroup label="🧠 Modul Kognitif & Logika Kecerdasan">
                        <option value="labirin_laut">🦈 Labirin Petualangan Mencari Jalan</option>
                        <option value="math_100">🧮 Penjumlahan & Berhitung Maksi (1-100)</option>
                        <option value="suku_kata">📝 Membaca & Mengeja Suku Kata Dasar</option>
                        <option value="mencari_perbedaan">🔍 Detektif Cilik: Mencari Perbedaan Gambar</option>
                        <option value="mencocokkan_bayangan">👥 Mencocokkan Siluet & Bayangan Objek</option>
                        <option value="dot_to_dot">✏️ Dot-to-Dot: Menghubungkan Titik Angka</option>
                        <option value="flashcard_kosakata">💡 Flashcard Edukasi Kosakata Pintar</option>
                    </optgroup>
                </select>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Ukuran Kertas</label>
                        <select id="paperSize" onchange="updateLivePreview()" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white outline-none">
                            <option value="a4" selected>A4 Standard</option>
                            <option value="f4">F4 / Folio</option>
                            <option value="a5">A5 Buku Kecil</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Jumlah Cetak Lembar</label>
                        <select id="totalPdfPages" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white font-mono font-bold">
                            <script>for(let i=1; i<=25; i++) { document.write(`<option value="${i}" ${i===5?'selected':''}>${i} Lembar</option>`); }</script>
                        </select>
                    </div>
                </div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <div class="space-y-1.5">
                    <label class="text-[11px] text-gray-300 font-semibold">Teks Instruksi Kerja</label>
                    <input type="text" id="instructionText" value="Mari menebalkan huruf Hijaiyah Alif Ba Ta berikut dengan rapi!" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-2 text-xs text-gray-300 outline-none" oninput="updateLivePreview()">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Warna Aksen Dokumen</label>
                <div class="grid grid-cols-5 gap-1 text-[10px] font-bold">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 py-1.5 rounded-lg">Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 py-1.5 rounded-lg">Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/10 text-pink-400 border border-pink-500/20 py-1.5 rounded-lg">Pink</button>
                    <button type="button" onclick="setTheme('emerald', '#10b981', '#047757')" class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 py-1.5 rounded-lg">Green</button>
                    <button type="button" onclick="setTheme('purple', '#a855f7', '#7e22ce')" class="bg-purple-500/10 text-purple-400 border border-purple-500/20 py-1.5 rounded-lg">Purple</button>
                </div>
            </div>

            <button id="btnGenerate" type="button" onclick="downloadMasterV109PDF()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-extrabold py-3.5 rounded-xl text-xs tracking-widest uppercase shadow-lg">
                <i class="fa-solid fa-sparkles mr-2"></i> GENERATE DOCUMENT
            </button>
        </div>

        <div class="lg:col-span-7 glass-panel p-5 rounded-3xl flex flex-col h-[88vh]">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3 mb-3">
                <h3 class="text-xs font-bold uppercase text-gray-400"><i class="fa-solid fa-expand text-indigo-400 mr-2"></i> Live Digital Screen Proof</h3>
                <div id="sizeIndicator" class="text-[10px] font-mono text-indigo-400 bg-indigo-500/5 px-2.5 py-0.5 border border-indigo-500/15 rounded-full">UKURAN: A4</div>
            </div>
            
            <div class="flex-1 floating-paper rounded-2xl p-5 text-gray-900 overflow-y-auto border border-gray-200 space-y-4 shadow-2xl custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-3 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span id="previewMaskot" class="text-2xl">🇲🇨</span>
                            <h2 id="previewTitle" class="text-sm font-black text-amber-600 uppercase">LEMBAR AKTIVITAS</h2>
                        </div>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-semibold italic mt-1 leading-relaxed"></p>
                    </div>
                    <div id="badgeLicensePreview" class="text-[9px] text-amber-600 border px-2 py-0.5 rounded-md font-mono font-black bg-amber-50">DEMO MODE</div>
                </div>
                <div class="space-y-3 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const DEFAULT_PERSONAL_KEY = "AKUANAKPINTAR";
        const DEFAULT_MRR_KEY = "MASTERPRO2026";
        const SECRET_SUPER_ADMIN_CODE = "ADMINSUPER2026";
        
        let currentLicenseMode = "demo"; 
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        window.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem("MASTER_KEY_PERSONAL")) localStorage.setItem("MASTER_KEY_PERSONAL", DEFAULT_PERSONAL_KEY);
            if(!localStorage.getItem("MASTER_KEY_MRR")) localStorage.setItem("MASTER_KEY_MRR", DEFAULT_MRR_KEY);

            document.getElementById("masterPersonalSetup").value = localStorage.getItem("MASTER_KEY_PERSONAL");
            document.getElementById("masterMrrSetup").value = localStorage.getItem("MASTER_KEY_MRR");
            
            const currentTitle = localStorage.getItem("CUSTOM_APP_TITLE") || "WORKSHEET STUDIO";
            const currentSub = localStorage.getItem("CUSTOM_APP_SUB") || "by. koh Ojiek";
            
            document.getElementById("customTitleInput").value = currentTitle;
            document.getElementById("customSubInput").value = currentSub;
            
            terapkanBrandingUI(currentTitle, currentSub);
            
            currentLicenseMode = localStorage.getItem("CURRENT_ACTIVE_MODE") || "demo";
            switchLicenseMode(currentLicenseMode);
        });

        function terapkanBrandingUI(titleText, subText) {
            document.getElementById("appMainTitle").innerText = titleText.toUpperCase();
            document.getElementById("appSubTitle").innerText = subText;
        }

        function simpanKunciMasterToko() {
            const pKey = document.getElementById("masterPersonalSetup").value.trim().toUpperCase() || DEFAULT_PERSONAL_KEY;
            const mKey = document.getElementById("masterMrrSetup").value.trim().toUpperCase() || DEFAULT_MRR_KEY;
            const cTitle = document.getElementById("customTitleInput").value.trim() || "WORKSHEET STUDIO";
            const cSub = document.getElementById("customSubInput").value.trim() || "by. koh Ojiek";
            
            localStorage.setItem("MASTER_KEY_PERSONAL", pKey);
            localStorage.setItem("MASTER_KEY_MRR", mKey);
            localStorage.setItem("CUSTOM_APP_TITLE", cTitle);
            localStorage.setItem("CUSTOM_APP_SUB", cSub);
            
            terapkanBrandingUI(cTitle, cSub);
            alert("Konfigurasi Toko Berhasil Diperbarui.");
            tutupPanelAdminEkstra();
        }

        function tutupPanelAdminEkstra() {
            document.getElementById("adminMasterPanel").classList.add("hidden");
            document.getElementById("configPersonalKey").value = "";
        }

        function switchLicenseMode(mode) {
            currentLicenseMode = mode;
            const btnDemo = document.getElementById("btnModeDemo");
            const btnPersonal = document.getElementById("btnModePersonal");
            const btnMrr = document.getElementById("btnModeMrr");
            const keyContainer = document.getElementById("keyInputContainer");
            const keyLabel = document.getElementById("keyInputLabel");
            const inputField = document.getElementById("configPersonalKey");

            inputField.value = ""; // Bersihkan kolom setiap kali pindah menu

            [btnDemo, btnPersonal, btnMrr].forEach(btn => btn.className = "bg-gray-800 text-gray-400 py-2 rounded-xl transition-all");

            if (mode === "demo") { 
                btnDemo.className = "bg-indigo-600 text-white py-2 rounded-xl"; 
                keyContainer.classList.add("hidden"); 
                localStorage.setItem("CURRENT_ACTIVE_MODE", "demo");
            } else if (mode === "personal") { 
                btnPersonal.className = "bg-blue-600 text-white py-2 rounded-xl"; 
                keyContainer.classList.remove("hidden"); 
                keyLabel.innerText = "Masukkan Kunci Lisensi Personal Anda:"; 
            } else if (mode === "mrr") { 
                btnMrr.className = "bg-emerald-600 text-white py-2 rounded-xl"; 
                keyContainer.classList.remove("hidden"); 
                keyLabel.innerText = "Masukkan Kunci Lisensi Master MRR Anda:"; 
            }
            
            // Jalankan validasi pasif (membaca memori lokal saat perpindahan tab)
            validasiPasifSistem();
        }

        // FUNGSI BARU: Hanya membaca memori lokal tanpa memotong inputan user
        function validasiPasifSistem() {
            let statusValid = false;
            if (currentLicenseMode === "demo") {
                statusValid = true;
            } else if (currentLicenseMode === "personal") {
                if (localStorage.getItem("AUTH_PERSONAL_DONE") === "true") statusValid = true;
            } else if (currentLicenseMode === "mrr") {
                if (localStorage.getItem("AUTH_MRR_DONE") === "true") statusValid = true;
            }
            evaluasiUIStatus(statusValid);
        }

        // FUNGSI BARU: Diaktifkan secara paksa HANYA jika pengguna menekan tombol "Aktifkan"
        function prosesValidasiTombolKlik() {
            const userInputValue = document.getElementById("configPersonalKey").value.trim().toUpperCase();

            if (userInputValue === SECRET_SUPER_ADMIN_CODE) {
                document.getElementById("adminMasterPanel").classList.remove("hidden");
                document.getElementById("configPersonalKey").value = "";
                alert("Akses Super Admin Diterima! Panel Konfigurasi Terbuka di Bawah.");
                return;
            }

            const targetPersonalKey = (localStorage.getItem("MASTER_KEY_PERSONAL") || DEFAULT_PERSONAL_KEY).toUpperCase();
            const targetMrrKey = (localStorage.getItem("MASTER_KEY_MRR") || DEFAULT_MRR_KEY).toUpperCase();

            if (currentLicenseMode === "personal") {
                if (userInputValue === targetPersonalKey && userInputValue !== "") {
                    localStorage.setItem("AUTH_PERSONAL_DONE", "true");
                    localStorage.setItem("CURRENT_ACTIVE_MODE", "personal");
                    alert("Sukses! Lisensi PERSONAL USE Berhasil Diaktifkan.");
                    evaluasiUIStatus(true);
                } else {
                    localStorage.removeItem("AUTH_PERSONAL_DONE"); // Hapus status jika salah ketik
                    alert("Kunci Salah atau Kosong! Gagal mengaktifkan mode Personal.");
                    evaluasiUIStatus(false);
                }
            } 
            else if (currentLicenseMode === "mrr") {
                if (userInputValue === targetMrrKey && userInputValue !== "") {
                    localStorage.setItem("AUTH_MRR_DONE", "true");
                    localStorage.setItem("CURRENT_ACTIVE_MODE", "mrr");
                    alert("Sukses! Lisensi MASTER MRR Berhasil Diaktifkan.");
                    evaluasiUIStatus(true);
                } else {
                    localStorage.removeItem("AUTH_MRR_DONE"); // Hapus status jika salah ketik
                    alert("Kunci Salah atau Kosong! Gagal mengaktifkan mode MRR Master.");
                    evaluasiUIStatus(false);
                }
            }
            document.getElementById("configPersonalKey").value = "";
        }

        function evaluasiUIStatus(isValid) {
            const badge = document.getElementById("statusBadge");
            const previewBadge = document.getElementById("badgeLicensePreview");
            const btnGenerate = document.getElementById("btnGenerate");

            if (currentLicenseMode === "demo") {
                btnGenerate.removeAttribute("disabled");
                btnGenerate.className = "w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-extrabold py-3.5 rounded-xl text-xs tracking-widest uppercase shadow-lg cursor-pointer";
                badge.className = "text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold";
                badge.innerText = "DEMO MODE ACTIVE";
                previewBadge.className = "text-[9px] text-amber-600 border border-amber-200 px-2 py-0.5 rounded-md bg-amber-50 font-black";
                previewBadge.innerText = "DEMO MODE (1 PAGE LIMIT)";
                return;
            }

            if (!isValid) {
                badge.className = "text-[10px] bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full font-bold";
                badge.innerText = "LISENSI INVALID / TERKUNCI";
                previewBadge.className = "text-[9px] text-rose-600 border border-rose-200 px-2 py-0.5 rounded-md bg-rose-50 font-black";
                previewBadge.innerText = "LOCKED";
                btnGenerate.setAttribute("disabled", "true"); 
                btnGenerate.className = "w-full bg-gray-700 text-gray-500 font-extrabold py-3.5 rounded-xl text-xs uppercase cursor-not-allowed opacity-40";
            } else {
                btnGenerate.removeAttribute("disabled");
                btnGenerate.className = "w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-extrabold py-3.5 rounded-xl text-xs tracking-widest uppercase shadow-lg cursor-pointer";
                
                if (currentLicenseMode === "personal") {
                    badge.className = "text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full font-bold";
                    badge.innerText = "PERSONAL USE UNLOCKED";
                    previewBadge.className = "text-[9px] text-blue-600 border border-blue-200 px-2 py-0.5 rounded-md bg-blue-50 font-black";
                    previewBadge.innerText = "PERSONAL LICENSE";
                } else if (currentLicenseMode === "mrr") {
                    badge.className = "text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-bold";
                    badge.innerText = "MRR MASTER UNLOCKED";
                    previewBadge.className = "text-[9px] text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded-md bg-emerald-50 font-black";
                    previewBadge.innerText = "MRR MASTER";
                }
            }
        }

        function resetPerangkatSaja() {
            localStorage.clear();
            alert("Memori Lisensi Dibersihkan! Seluruh mode kembali terkunci.");
            location.reload();
        }

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            const maskot = document.getElementById("previewMaskot");

            if (mode === "mewarnai_hewan") { instInput.value = "Warnai gambar makhluk hewan laut lucu di bawah ini sesuai imajinasimu!"; maskot.innerText = "🎨"; }
            else if (mode === "mewarnai_buah") { instInput.value = "Warnai buah-buahan segar berikut sesuai dengan kreativitasmu!"; maskot.innerText = "🍓"; }
            else if (mode === "mewarnai_kendaraan") { instInput.value = "Yuk warnai mobil balap sport super cepat ini dengan warna kesukaanmu!"; maskot.innerText = "🚗"; }
            else if (mode === "mewarnai_dino") { instInput.value = "Warnai dinosaurus T-Rex purba raksasa ini agar terlihat keren!"; maskot.innerText = "🦖"; }

        function drawVectorHijaiyah(doc, type, x, y) {
            doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.8);

                doc.line(x, y - 12, x, y + 12);
                doc.line(x - 2, y - 16, x + 2, y - 16); doc.line(x + 2, y - 16, x - 2, y - 19);
            } 
            else if (type === 'ba' || type === 'ta' || type === 'tsa') {
                doc.line(x - 14, y, x - 12, y + 6); doc.line(x - 12, y + 6, x + 12, y + 6); doc.line(x + 12, y + 6, x + 14, y);
                if (type === 'ba') {
                    doc.setFillColor(150, 150, 150); doc.circle(x, y + 11, 1.2, "F");

        }
