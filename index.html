<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet & Planner Creator v9.7 (Ultra-Stable Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { 
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 40%),
                        #030712;
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .floating-paper {
            background: #ffffff;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(99, 102, 241, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2 relative z-10">
        
        <div class="lg:col-span-5 glass-panel p-5 rounded-3xl space-y-4 max-h-[88vh] overflow-y-auto custom-scrollbar">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-pink-400 to-amber-300 bg-clip-text text-transparent uppercase">Worksheet Studio</h1>
                    <p class="text-[11px] text-gray-400 font-medium tracking-wide mt-0.5">v9.7 Stable Core Engine</p>
                </div>
                <div id="statusBadge" class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold tracking-wide">
                    DEMO MODE ACTIVE
                </div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl border-l-4 border-l-indigo-500/60 space-y-3">
                <label class="text-[11px] text-indigo-400 font-bold uppercase block"><i class="fa-solid fa-keyhole mr-1"></i> Pilih Mode Lisensi Engine</label>
                <div class="grid grid-cols-3 gap-1.5 text-[10px] font-bold">
                    <button type="button" id="btnModeDemo" onclick="switchLicenseMode('demo')" class="bg-indigo-600 text-white py-2 rounded-xl transition-all">Demo Mode</button>
                    <button type="button" id="btnModePersonal" onclick="switchLicenseMode('personal')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">Personal Use</button>
                    <button type="button" id="btnModeMrr" onclick="switchLicenseMode('mrr')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">MRR Master</button>
                </div>

                <div id="keyInputContainer" class="hidden space-y-2 pt-1 border-t border-gray-800/60">
                    <label id="keyInputLabel" class="text-[10px] text-gray-400 block">Masukkan Kunci Lisensi Anda:</label>
                    <div class="flex gap-2">
                        <input type="text" id="configPersonalKey" placeholder="Ketik Lisensi Anda..." class="flex-1 bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white tracking-wider outline-none font-mono">
                        <button type="button" onclick="simpanKunciAktivasi()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-1.5 rounded-xl text-xs transition-all">Aktifkan</button>
                    </div>
                </div>

                <div class="border-t border-gray-800/60 pt-2 flex flex-col gap-1.5">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="email" id="mrrEmail" placeholder="Email Terdaftar..." class="w-full bg-gray-950/20 border border-gray-800/80 rounded-xl px-2.5 py-1 text-[11px] text-gray-300 outline-none">
                        <input type="text" id="mrrPhone" placeholder="No HP/WhatsApp..." class="w-full bg-gray-950/20 border border-gray-800/80 rounded-xl px-2.5 py-1 text-[11px] text-gray-300 outline-none">
                    </div>
                    <button type="button" onclick="resetPasswordEngine()" class="w-full bg-gray-900 hover:bg-gray-800 text-gray-400 text-[10px] py-1 rounded-lg transition-all"><i class="fa-solid fa-rotate-left mr-1"></i> Reset Lisensi Mandiri (Default)</button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Kategori Modul Aktivitas</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-950/60 border border-gray-800 focus:border-indigo-500 rounded-xl px-3 py-2 text-xs text-gray-200 outline-none font-medium">
                    <optgroup label="🌟 Bundel Premium Terkini (Full Unlocked)">
                        <option value="mewarnai_hewan" selected>🎨 Mewarnai Ragam Hebat Hewan Lucu</option>
                        <option value="mewarnai_buah">🍓 Mewarnai Buah-Buahan Segar</option>
                        <option value="labirin_laut">🦈 Labirin Petualangan Hewan Laut</option>
                        <option value="math_100">🧮 Penjumlahan & Berhitung Maksi (1-100)</option>
                        <option value="hijaiyah">🕌 Menulis & Tracing Huruf Hijaiyah</option>
                        <option value="trace_alphabet">🇬🇧 Trace the Alphabet (Putus-Putus)</option>
                        <option value="belajar_bentuk">📐 Mengenal & Belajar Bentuk Dasar</option>
                        <option value="suku_kata">📝 Membaca & Mengeja Suku Kata</option>
                    </optgroup>
                </select>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <p class="text-[11px] text-indigo-400 font-bold uppercase tracking-wider"><i class="fa-solid fa-sliders mr-1"></i> Pengaturan Cetak Dokumen</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Ukuran Kertas</label>
                        <select id="paperSize" onchange="updateLivePreview()" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white outline-none font-semibold">
                            <option value="a4" selected>A4 Standard</option>
                            <option value="f4">F4 / Folio</option>
                            <option value="a5">A5 Buku Kecil</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Jumlah Cetak Lembar</label>
                        <select id="totalPdfPages" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white outline-none font-mono font-bold">
                            <script>
                                for(let i=1; i<=25; i++) {
                                    document.write(`<option value="${i}" ${i===5?'selected':''}>${i} Lembar</option>`);
                                }
                            </script>
                        </select>
                    </div>
                </div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <div class="space-y-1.5">
                    <label class="text-[11px] text-gray-300 font-semibold">Teks Instruksi Kerja</label>
                    <input type="text" id="instructionText" value="Warnai gambar makhluk hewan laut lucu di bawah ini sesuai imajinasimu!" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-2 text-xs text-gray-300 outline-none" oninput="updateLivePreview()">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Estetika Warna Lembar Kerja (10 Pilihan)</label>
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-1.5 text-[10px] font-bold">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 py-1.5 rounded-lg">Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 py-1.5 rounded-lg">Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/10 text-pink-400 border border-pink-500/20 py-1.5 rounded-lg">Pink</button>
                    <button type="button" onclick="setTheme('emerald', '#10b981', '#047757')" class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 py-1.5 rounded-lg">Emerald</button>
                    <button type="button" onclick="setTheme('purple', '#a855f7', '#7e22ce')" class="bg-purple-500/10 text-purple-400 border border-purple-500/20 py-1.5 rounded-lg">Purple</button>
                    <button type="button" onclick="setTheme('indigo', '#6366f1', '#4338ca')" class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 py-1.5 rounded-lg">Indigo</button>
                    <button type="button" onclick="setTheme('rose', '#f43f5e', '#be123c')" class="bg-rose-500/10 text-rose-400 border border-rose-500/20 py-1.5 rounded-lg">Rose</button>
                    <button type="button" onclick="setTheme('cyan', '#06b6d4', '#0e7490')" class="bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 py-1.5 rounded-lg">Cyan</button>
                    <button type="button" onclick="setTheme('orange', '#f97316', '#c2410c')" class="bg-orange-500/10 text-orange-400 border border-orange-500/20 py-1.5 rounded-lg">Orange</button>
                    <button type="button" onclick="setTheme('slate', '#64748b', '#334155')" class="bg-slate-500/10 text-slate-400 border border-slate-500/20 py-1.5 rounded-lg">Slate</button>
                </div>
            </div>

            <button id="btnGenerate" type="button" onclick="downloadMasterV97PDF()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-400 hover:to-pink-400 text-white font-extrabold py-3.5 px-4 rounded-xl text-xs shadow-lg uppercase tracking-widest">
                <i class="fa-solid fa-sparkles mr-2 text-xs"></i> GENERATE DOCUMENT
            </button>
        </div>

        <div class="lg:col-span-7 glass-panel p-5 rounded-3xl flex flex-col h-[88vh]">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3 mb-3">
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400"><i class="fa-solid fa-expand text-indigo-400 mr-2"></i> Live Digital Screen Proof</h3>
                <div id="sizeIndicator" class="text-[10px] font-mono text-indigo-400 bg-indigo-500/5 px-2.5 py-0.5 border border-indigo-500/15 rounded-full">UKURAN: A4</div>
            </div>
            
            <div class="flex-1 floating-paper rounded-2xl p-5 text-gray-900 overflow-y-auto border border-gray-200 space-y-4 shadow-2xl custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-3 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span id="previewMaskot" class="text-2xl">🎨</span>
                            <h2 id="previewTitle" class="text-sm font-black tracking-wide text-amber-600 uppercase">LEMBAR AKTIVITAS</h2>
                        </div>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-semibold italic mt-1 leading-relaxed"></p>
                    </div>
                    <div id="badgeLicensePreview" class="text-[9px] text-amber-600 border px-2 py-0.5 rounded-md font-mono font-black bg-amber-50">DEMO MODE</div>
                </div>

                <div class="space-y-3 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        // 🔒 AKURASI BRANKAS KUNCI DEFAULT (DIJAMIN BEBAS BENTROK)
        const DEFAULT_PERSONAL_KEY = "ANAKPINTAR2026";
        const DEFAULT_MRR_KEY = "MASTERPRO2026";

        let selectedGateMode = "demo"; 
        let isAuthorized = true; 
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        // MENGATUR NAVIGASI STRUKTUR TOMBOL LISENSI
        function switchLicenseMode(mode) {
            selectedGateMode = mode;
            
            const btnDemo = document.getElementById("btnModeDemo");
            const btnPersonal = document.getElementById("btnModePersonal");
            const btnMrr = document.getElementById("btnModeMrr");
            const keyContainer = document.getElementById("keyInputContainer");
            const keyLabel = document.getElementById("keyInputLabel");
            const inputField = document.getElementById("configPersonalKey");

            [btnDemo, btnPersonal, btnMrr].forEach(btn => {
                btn.className = "bg-gray-800 text-gray-400 py-2 rounded-xl transition-all";
            });

            if (mode === "demo") {
                btnDemo.className = "bg-indigo-600 text-white py-2 rounded-xl transition-all";
                keyContainer.classList.add("hidden");
                isAuthorized = true;
            } else if (mode === "personal") {
                btnPersonal.className = "bg-blue-600 text-white py-2 rounded-xl transition-all";
                keyContainer.classList.remove("hidden");
                keyLabel.innerText = "Masukkan Kunci Lisensi Personal Use:";
                inputField.value = localStorage.getItem("LAST_TYPED_KEY_PERSONAL") || DEFAULT_PERSONAL_KEY;
            } else if (mode === "mrr") {
                btnMrr.className = "bg-emerald-600 text-white py-2 rounded-xl transition-all";
                keyContainer.classList.remove("hidden");
                keyLabel.innerText = "Masukkan Kunci Lisensi MRR Enterprise:";
                inputField.value = localStorage.getItem("LAST_TYPED_KEY_MRR") || DEFAULT_MRR_KEY;
            }
            validasiProsesKunci();
        }

        // 🔥 LOGIKA VERIFIKASI BARU: TIDAK SENSITIF HURUF BESAR/KECIL & ANTI-ERROR
        function validasiProsesKunci() {
            if (selectedGateMode === "demo") {
                isAuthorized = true;
                evaluasiUIStatus();
                return;
            }

            const inputVal = document.getElementById("configPersonalKey").value.trim().toUpperCase();
            const storedPersonal = (localStorage.getItem("KEY_PERSONAL_CONFIG") || DEFAULT_PERSONAL_KEY).toUpperCase();
            const storedMrr = (localStorage.getItem("KEY_MRR_CONFIG") || DEFAULT_MRR_KEY).toUpperCase();

            if (selectedGateMode === "personal" && (inputVal === DEFAULT_PERSONAL_KEY || inputVal === storedPersonal)) {
                isAuthorized = true;
            } else if (selectedGateMode === "mrr" && (inputVal === DEFAULT_MRR_KEY || inputVal === storedMrr)) {
                isAuthorized = true;
            } else {
                isAuthorized = false;
            }
            evaluasiUIStatus();
        }

        function simpanKunciAktivasi() {
            const inputVal = document.getElementById("configPersonalKey").value.trim();
            if (selectedGateMode === "personal") localStorage.setItem("LAST_TYPED_KEY_PERSONAL", inputVal);
            if (selectedGateMode === "mrr") localStorage.setItem("LAST_TYPED_KEY_MRR", inputVal);
            
            validasiProsesKunci();
            
            if(isAuthorized) {
                alert(`Sukses! Lisensi ${selectedGateMode.toUpperCase()} Berhasil Diaktifkan.`);
            } else {
                alert("Maaf, Kunci Lisensi salah atau tidak sesuai!");
            }
        }

        function evaluasiUIStatus() {
            const badge = document.getElementById("statusBadge");
            const previewBadge = document.getElementById("badgeLicensePreview");
            const btnGenerate = document.getElementById("btnGenerate");

            if (!isAuthorized) {
                badge.className = "text-[10px] bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full font-bold tracking-wide";
                badge.innerText = "LISENSI INVALID / TERKUNCI";
                previewBadge.className = "text-[9px] text-rose-600 border border-rose-200 px-2 py-0.5 rounded-md font-mono font-black bg-rose-50";
                previewBadge.innerText = "LOCKED";
                btnGenerate.setAttribute("disabled", "true");
                btnGenerate.className = "w-full bg-gray-700 text-gray-500 font-extrabold py-3.5 px-4 rounded-xl text-xs uppercase tracking-widest cursor-not-allowed opacity-40";
            } else {
                btnGenerate.removeAttribute("disabled");
                btnGenerate.className = "w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-400 hover:to-pink-400 text-white font-extrabold py-3.5 px-4 rounded-xl text-xs shadow-lg uppercase tracking-widest";
                
                if (selectedGateMode === "demo") {
                    badge.className = "text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold tracking-wide";
                    badge.innerText = "DEMO MODE ACTIVE";
                    previewBadge.className = "text-[9px] text-amber-600 border border-amber-200 px-2 py-0.5 rounded-md font-mono font-black bg-amber-50";
                    previewBadge.innerText = "DEMO MODE (1 PAGE LIMIT)";
                } else if (selectedGateMode === "personal") {
                    badge.className = "text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full font-bold tracking-wide";
                    badge.innerText = "PERSONAL USE UNLOCKED";
                    previewBadge.className = "text-[9px] text-blue-600 border border-blue-200 px-2 py-0.5 rounded-md font-mono font-black bg-blue-50";
                    previewBadge.innerText = "PERSONAL LICENSE";
                } else if (selectedGateMode === "mrr") {
                    badge.className = "text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-bold tracking-wide";
                    badge.innerText = "MRR MASTER UNLOCKED";
                    previewBadge.className = "text-[9px] text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded-md font-mono font-black bg-emerald-50";
                    previewBadge.innerText = "MRR MASTER";
                }
            }
        }

        function resetPasswordEngine() {
            const email = document.getElementById("mrrEmail").value.trim();
            const phone = document.getElementById("mrrPhone").value.trim();
            if(!email || !phone) { alert("Silakan isi kolom Email dan No HP/WA Anda untuk verifikasi data!"); return; }
            
            localStorage.setItem("KEY_PERSONAL_CONFIG", DEFAULT_PERSONAL_KEY);
            localStorage.setItem("KEY_MRR_CONFIG", DEFAULT_MRR_KEY);
            localStorage.removeItem("LAST_TYPED_KEY_PERSONAL");
            localStorage.removeItem("LAST_TYPED_KEY_MRR");
            
            alert("Sistem berhasil mereset sandi toko Anda ke default pabrik.");
            location.reload();
        }

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            const maskot = document.getElementById("previewMaskot");

            if (mode === "mewarnai_hewan") { instInput.value = "Warnai gambar makhluk hewan laut lucu di bawah ini sesuai imajinasimu!"; maskot.innerText = "🎨"; }
            else if (mode === "mewarnai_buah") { instInput.value = "Warnai buah-buahan segar berikut sesuai dengan kreativitasmu!"; maskot.innerText = "🍓"; }
            else if (mode === "math_100") { instInput.value = "Selesaikan kuis operasi penjumlahan bilangan 1 sampai 100 berikut!"; maskot.innerText = "🧮"; }
            else if (mode === "hijaiyah") { instInput.value = "Mari menebalkan huruf Hijaiyah berikut dengan rapi!"; maskot.innerText = "🕌"; }
            else if (mode === "trace_alphabet") { instInput.value = "Trace the uppercase and lowercase letters carefully!"; maskot.innerText = "🇬🇧"; }
            else if (mode === "labirin_laut") { instInput.value = "Bantu Gurita kecil menemukan jalan menuju terumbu karang!"; maskot.innerText = "🦈"; }
            else if (mode === "belajar_bentuk") { instInput.value = "Tebalkan garis putus-putus geometri di bawah ini!"; maskot.innerText = "📐"; }
            else if (mode === "suku_kata") { instInput.value = "Eja dan baca kombinasi suku kata dasar di bawah ini!"; maskot.innerText = "📝"; }
        }

        function setTheme(name, hex1, hex2) {
            activeThemeName = name; activePrimaryColor = hex1; activeSecondaryColor = hex2;
            document.getElementById("headerBox").style.borderColor = hex1;
            document.getElementById("previewTitle").style.color = hex2;
            updateLivePreview();
        }

        function updateLivePreview() {
            const mode = document.getElementById("workMode").value;
            const size = document.getElementById("paperSize").value;
            const container = document.getElementById("previewContainer");
            
            document.getElementById("sizeIndicator").innerText = `UKURAN KERTAS: ${size.toUpperCase()}`;
            document.getElementById("previewInstruction").innerText = document.getElementById("instructionText").value;
            document.getElementById("previewTitle").innerText = mode.replace("_", " ").toUpperCase();

            let html = `
                <div class="border-2 border-dashed rounded-2xl p-8 text-center text-gray-400 bg-gray-50 flex flex-col items-center justify-center min-h-[180px]" style="border-color:${activePrimaryColor}">
                    <span class="text-5xl opacity-40 mb-2">🎨</span>
                    <p class="text-xs font-mono font-bold text-gray-600">[ Modul Konten Generator ${mode.toUpperCase()} Aktif ]</p>
                    <p class="text-[10px] text-gray-400 mt-1">Siap dicetak berlembar-lembar secara otomatis ke PDF berkepadatan tinggi.</p>
                </div>`;
            container.innerHTML = html;
        }

        // ENGINE GENERATOR DENGAN BATASAN DAN FITUR EQUAL
        function downloadMasterV96PDF() {
            if(!isAuthorized) return;

            const mode = document.getElementById("workMode").value;
            const sizeOption = document.getElementById("paperSize").value;
            let maxPages = parseInt(document.getElementById("totalPdfPages").value);
            const instText = document.getElementById("instructionText").value;

            // KENDALI PEMBATAS MODUL DEMO: Hanya batasi jumlah lembar PDF-nya saja!
            if(selectedGateMode === "demo" && maxPages > 1) {
                alert("Sistem mendeteksi Mode Demo. Jumlah unduhan otomatis dipangkas menjadi maksimal 1 halaman! Aktifkan Lisensi Personal/MRR untuk cetak banyak halaman.");
                maxPages = 1;
            }

            const { jsPDF } = window.jspdf;
            
            let formatSize = "a4";
            if (sizeOption === "f4") formatSize = [215, 330];
            if (sizeOption === "a5") formatSize = "a5";

            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: formatSize });

            for (let page = 1; page <= maxPages; page++) {
                if (page > 1) doc.addPage();

                // Bingkai Garis Tepi luar
                doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.5);
                let w = sizeOption === "a5" ? 138 : (sizeOption === "f4" ? 205 : 194);
                let h = sizeOption === "a5" ? 200 : (sizeOption === "f4" ? 320 : 281);
                doc.rect(8, 8, w, h);

                // Banner Header Accent Line
                doc.setFillColor(activePrimaryColor); doc.rect(12, 12, w - 8, 2, "F");

                // Judul Dokumen & Instruksi Kerja
                doc.setFont("Helvetica", "bold"); doc.setFontSize(14); doc.setTextColor(activeSecondaryColor);
                doc.text(mode.replace("_", " ").toUpperCase(), 15, 24);

                doc.setFont("Helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(80, 80, 80);
                doc.text(`${instText} (Lembar Ke-${page})`, 15, 30);

                let centerX = w / 2;
                let centerY = h / 2 + 10;

                // Render Konten Vektor sesuai Kategori Pilihan
                if (mode === "mewarnai_hewan") {
                    doc.setDrawColor(40, 40, 40); doc.setLineWidth(0.8);
                    doc.circle(centerX, centerY, 30, "D"); 
                    doc.circle(centerX - 10, centerY - 8, 3, "D");
                    doc.circle(centerX + 10, centerY - 8, 3, "D");
                    for(let t = 0; t < 4; t++) {
                        doc.line(centerX - 30, centerY + (t * 6), centerX - 48, centerY + 10 + (t * 4));
                        doc.line(centerX + 30, centerY + (t * 6), centerX + 48, centerY + 10 + (t * 4));
                    }
                } else if (mode === "mewarnai_buah") {
                    doc.setDrawColor(40, 40, 40); doc.setLineWidth(0.8);
                    doc.ellipse(centerX, centerY, 28, 32, "D"); 
                    doc.line(centerX, centerY - 28, centerX - 12, centerY - 40);
                    doc.line(centerX, centerY - 28, centerX + 12, centerY - 40);
                } else if (mode === "math_100") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(50, 50, 50);
                    let innerY = 48;
                    for (let i = 1; i <= 10; i++) {
                        doc.setDrawColor(240, 240, 240); doc.rect(15, innerY - 5, w - 14, 11, "D");
                        let n1 = 40 + (i * 3) + page; let n2 = 15 + (i * 2);
                        doc.text(`Soal ${i}:      ${n1}   +   ${n2}   =   ...............`, 20, innerY + 2);
                        innerY += 14;
                    }
                } else if (mode === "labirin_laut" || mode === "hijaiyah" || mode === "trace_alphabet" || mode === "belajar_bentuk" || mode === "suku_kata") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(100, 100, 100);
                    doc.rect(20, 45, w - 25, h - 70, "D");
                    doc.text(`[ Konten Blok Utama Modul ${mode.toUpperCase()} - Halaman ${page} ]`, 25, 55);
                    doc.setFont("Helvetica", "normal"); doc.setFontSize(9);
                    doc.text("Gunakan alat tulis atau krayon berwarna untuk melatih konsentrasi anak.", 25, 65);
                }

                // Footer Proteksi Hak Cipta
                doc.setFont("Helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(170, 170, 170);
                doc.text(`Worksheet Studio Premium v9.6 [${selectedGateMode.toUpperCase()}] - Hak Cipta Produk Koh Ojiek`, 15, h + 3);
            }

            doc.save(`Worksheet_${selectedGateMode}_${mode}.pdf`);
        }

        // Boot-up engine
        toggleInputs(); updateLivePreview(); switchLicenseMode('demo');
    </script>
</body>
</html>
