<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet & Planner Creator v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .pro-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-trace { font-family: 'Courier New', Courier, monospace; letter-spacing: 6px; font-weight: bold; text-transform: uppercase; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col justify-between">

    <!-- MAIN DASHBOARD -->
    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2">
        <!-- PANEL KONTROL KIRI -->
        <div class="lg:col-span-5 pro-card p-5 rounded-2xl space-y-4">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <div>
                    <h1 class="text-md font-bold bg-gradient-to-r from-amber-400 via-pink-500 to-emerald-400 bg-clip-text text-transparent uppercase tracking-wider">Worksheet & Planner v6.0</h1>
                    <p class="text-[10px] text-gray-400">Mega Activity Engine by Koh Ojiek</p>
                </div>
                <span class="text-[9px] bg-gradient-to-r from-pink-500 to-purple-600 text-white px-2 py-0.5 rounded-full font-bold shadow-md">
                    MEGA BUNDLE
                </span>
            </div>

            <!-- KODE LISENSI -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Kode Akses Premium / Lisensi</label>
                <input type="password" id="licenseKey" placeholder="Masukkan kode lisensi..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
            </div>

            <!-- MENU KATEGORI SUPER LENGKAP v6.0 -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Pilih Kategori Lembar Kerja & Aktivitas</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white font-medium">
                    <option value="tracing">✍️ Menu 1: Tracing Nama, Alfabet & Angka Dasar</option>
                    <option value="math">🧮 Menu 2: Matematika, Berhitung Visual & Teka-Teki</option>
                    <option value="planner">📅 Menu 3: Kids Planners & Belajar Mengatur Waktu</option>
                    <option value="indonesia">📝 Menu 4: Bahasa Indonesia, Cerita Anak & Sains</option>
                    <option value="english">🇬🇧 Menu 5: English Flashcard, Buah, Hewan & Profesi</option>
                    <option value="creative">🎨 Menu 6: Busy Book, Mewarnai, Origami & Gunting Tempel</option>
                </select>
            </div>

            <!-- PANEL INPUT CONFIG DINAMIS -->
            <div class="space-y-3 bg-gray-950/40 p-3.5 border border-gray-900 rounded-xl">
                <div id="inputTracingGroup" class="space-y-1">
                    <label class="text-[11px] text-gray-400 block font-medium">Nama / Teks Anak</label>
                    <input type="text" id="childName" maxlength="12" value="EVAN" placeholder="Contoh: EVAN..." class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white uppercase font-bold" oninput="updateLivePreview()">
                </div>

                <div id="customMatrixGroup" class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400 block font-medium">Jumlah Baris / Soal</label>
                        <select id="totalQuestions" onchange="updateLivePreview()" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-2 py-2 text-xs text-white">
                            <option value="5">5 Item</option>
                            <option value="8">8 Item</option>
                            <option value="10" selected>10 Item Lengkap</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400 block font-medium">Batas Angka Maks</label>
                        <input type="number" id="maxMatrixNumber" value="20" min="10" max="100" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white font-bold" oninput="updateLivePreview()">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] text-gray-400 block font-medium">Pilih Maskot Animasi</label>
                    <select id="characterMaskot" onchange="updateLivePreview()" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white font-medium">
                        <option value="🐻">Teddy Bear (🐻)</option>
                        <option value="🐰">Kelinci Imut (🐰)</option>
                        <option value="🐱">Kucing Gemas (🐱)</option>
                        <option value="🐼">Panda Gembrot (🐼)</option>
                        <option value="🦖">Dino Cilik (🦖)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] text-gray-400 block font-medium">Teks Instruksi / Judul Atas</label>
                    <input type="text" id="instructionText" value="Yuk, belajar menebalkan namamu sendiri dengan rapi!" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white" oninput="updateLivePreview()">
                </div>
            </div>

            <!-- PILIHAN TEMA WARNA (6 VARIASI) -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Pilih Warna Lembar Kerja</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] font-bold py-1.5 rounded-lg">💛 Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] font-bold py-1.5 rounded-lg">💙 Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/10 text-pink-400 border border-pink-500/20 text-[10px] font-bold py-1.5 rounded-lg">💗 Pink</button>
                    <button type="button" onclick="setTheme('green', '#10b981', '#047857')" class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] font-bold py-1.5 rounded-lg">💚 Green</button>
                    <button type="button" onclick="setTheme('purple', '#8b5cf6', '#6d28d9')" class="bg-purple-500/10 text-purple-400 border border-purple-500/20 text-[10px] font-bold py-1.5 rounded-lg">💜 Purple</button>
                    <button type="button" onclick="setTheme('dark', '#374151', '#1f2937')" class="bg-gray-500/10 text-gray-400 border border-gray-500/20 text-[10px] font-bold py-1.5 rounded-lg">🖤 Mono</button>
                </div>
            </div>

            <button type="button" onclick="downloadMegaBundlePDF()" class="w-full bg-gradient-to-r from-orange-500 via-pink-500 to-indigo-600 text-white font-bold py-3 px-4 rounded-xl text-xs shadow-lg uppercase tracking-wider">
                <i class="fa-solid fa-file-pdf mr-1"></i> CETAK MEGA BUNDLE WORKSHEET (A4)
            </button>
        </div>

        <!-- PANEL PREVIEW LIVE -->
        <div class="lg:col-span-7 pro-card p-5 rounded-2xl flex flex-col h-[580px]">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h3 class="text-xs font-semibold text-gray-300">Live Workspace Preview (Kertas A4)</h3>
                <div id="themeIndicator" class="text-[9px] border px-2 py-0.5 rounded text-amber-400 border-amber-500/30">Tema: AMBER</div>
            </div>
            
            <div class="flex-1 bg-white rounded-xl p-5 text-gray-900 overflow-y-auto border-2 border-gray-300 space-y-4 shadow-inner custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-2 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span id="previewMaskot" class="text-xl">🐻</span>
                            <h2 id="previewTitle" class="text-sm font-black text-amber-600">MEGA BUNDLE GENERATOR</h2>
                        </div>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-medium italic mt-1">Yuk, belajar sejak dini dengan menyenangkan!</p>
                    </div>
                    <div class="text-[9px] text-gray-400 border p-1 rounded font-mono bg-gray-50">v6.0 Pro</div>
                </div>

                <div class="space-y-3 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const DAFTAR_LISENSI_VALID = ["MASTERPRO2026", "CUANMAKSIMAL", "OJIEKCREATIVE"];
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            
            document.getElementById("inputTracingGroup").style.display = (mode === "tracing") ? "block" : "none";

            if (mode === "tracing") instInput.value = "Yuk, belajar menebalkan namamu sendiri, huruf alfabet, dan angka dasar!";
            else if (mode === "math") instInput.value = "Kuis Matematika Pintar: Hitunglah gambar, hubungkan teka-teki, dan isi kotak angka!";
            else if (mode === "planner") instInput.value = "Kids Planner Harian: Mari belajar mengatur waktu, jadwal harian, dan kebiasaan baik!";
            else if (mode === "indonesia") instInput.value = "Bahasa Indonesia & Sains: Bacalah cerita anak lalu selesaikan kuis sains cilik!";
            else if (mode === "english") instInput.value = "English Flashcard: Belajar mengenal nama hewan, buah, sayur, profesi, dan benda!";
            else if (mode === "creative") instInput.value = "Kreativitas & Motorik Halus: Halaman Busy Book, mewarnai gambar, dan pola origami!";
        }

        function setTheme(name, hex1, hex2) {
            activeThemeName = name; activePrimaryColor = hex1; activeSecondaryColor = hex2;
            document.getElementById("themeIndicator").innerText = `Tema: ${name.toUpperCase()}`;
            document.getElementById("headerBox").style.borderColor = hex1;
            document.getElementById("previewTitle").style.color = hex2;
            updateLivePreview();
        }

        function updateLivePreview() {
            const mode = document.getElementById("workMode").value;
            const maskot = document.getElementById("characterMaskot").value;
            const container = document.getElementById("previewContainer");
            const titleText = document.getElementById("previewTitle");
            
            document.getElementById("previewInstruction").innerText = document.getElementById("instructionText").value;
            document.getElementById("previewMaskot").innerText = maskot;

            titleText.innerText = "LAYOUT PRATINJAU BUNDLE v6.0";
            container.innerHTML = `
                <div class='border border-dashed p-4 rounded-lg bg-gray-50 text-center text-xs text-gray-500 font-mono'>
                    👑 Mode Terpilih: [${mode.toUpperCase()}] <br> 
                    Tata letak lembar kerja beresolusi tinggi, ornamen bingkai dekoratif, dan modul materi premium siap disusun otomatis ke cetakan kertas A4.
                </div>`;
        }

        function downloadMegaBundlePDF() {
            const lic = document.getElementById("licenseKey").value.trim();
            const mode = document.getElementById("workMode").value;
            const inst = document.getElementById("instructionText").value.trim();
            const childName = document.getElementById("childName").value.trim().toUpperCase() || "ANAK";
            const maskot = document.getElementById("characterMaskot").value;
            const totalQ = parseInt(document.getElementById("totalQuestions").value);
            const maxN = parseInt(document.getElementById("maxMatrixNumber").value) || 20;

            if (!lic || !DAFTAR_LISENSI_VALID.includes(lic)) { alert("Kode Lisensi Akses Premium Salah!"); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            // 🎨 PREMIUM DOUBLE BORDER FRAME FOR ALL LAYOUTS
            doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.4); doc.rect(8, 8, 194, 281);
            doc.setDrawColor(230, 230, 230); doc.setLineWidth(0.2); doc.rect(9.5, 9.5, 191, 278);

            // HEADER STRIP & MASKOT ANIMASI
            doc.setFillColor(activePrimaryColor); doc.rect(15, 15, 180, 2, "F");
            doc.setFont("Helvetica", "bold"); doc.setFontSize(20); doc.text(maskot, 16, 25);

            // JUDUL UTAMA MODUL
            doc.setFontSize(13); doc.setTextColor(activeSecondaryColor);
            let pTitle = "KIDS WORKSHEET MEGA BUNDLE v6.0";
            if (mode === "tracing") pTitle = `PANDUAN TRACING ALFABET, NAMA & ANGKA`;
            if (mode === "math") pTitle = "MATEMATIKA CERIA: BERHITUNG, COCOKKAN & TEKA-TEKI";
            if (mode === "planner") pTitle = "KIDS PLANNER AGENDA: AJARKAN ATUR WAKTU SEJAK DINI";
            if (mode === "indonesia") pTitle = "BAHASA INDONESIA, MEMBACA CERITA DAN SAINS ANAK";
            if (mode === "english") pTitle = "ENGLISH FLASHCARD: HEWAN, BUAH, SAYUR & PROFESI";
            if (mode === "creative") pTitle = "BUSY BOOK PAGES, MEWARNAI & GERAK MOTORIK ORIGAMI";
            doc.text(pTitle, 26, 23);

            // SUB INSTRUKSI SOAL
            doc.setFont("Helvetica", "oblique"); doc.setFontSize(8.5); doc.setTextColor(100, 100, 100);
            doc.text(inst, 15, 30);
            doc.setDrawColor(200, 200, 200); doc.setLineDashPattern([2, 2], 0); doc.line(15, 34, 195, 34);

            let y = 50; doc.setFont("Helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(40, 40, 40);

            // ----------------------------------------------------
            // CORE LOGIC BUNDLE IMPLEMENTATION (NO API CORES)
            // ----------------------------------------------------
            if (mode === "tracing") {
                // TRACING ALFABET, NAMA, DAN ANGKA (BUKU GARIS HALUS PRESISI)
                doc.setDrawColor(activePrimaryColor); doc.setLineDashPattern([], 0); doc.rect(15, 40, 180, 30);
                doc.setFont("Helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(150, 150, 150);
                doc.text("[ AREA POSTER MINI / GAMBAR ALFABET UTAMA ]", 65, 56);

                let lineY = 90; doc.setFont("Courier", "bold"); doc.setFontSize(22); doc.setTextColor(180, 180, 180);
                const sn = childName.split("").join("  ");

                for (let i = 0; i < 7; i++) {
                    doc.setDrawColor(180, 200, 240); doc.line(15, lineY - 5, 195, lineY - 5);
                    doc.setDrawColor(140, 160, 220); doc.line(15, lineY, 195, lineY);
                    doc.setDrawColor(180, 200, 240); doc.line(15, lineY + 4, 195, lineY + 4);
                    doc.text(sn, 22, lineY + 1.5); lineY += 25;
                }

            } else if (mode === "math") {
                // MATEMATIKA, MENCANGKUP BERHITUNG VISUAL, MENCOCOKKAN & TEKA-TEKI
                doc.setFont("Helvetica", "bold"); doc.setFontSize(18);
                const icons = ["⭐", "🍎", "🍭", "🚗", "🦖"];
                for (let i = 0; i < 5; i++) {
                    doc.setDrawColor(240, 240, 240); doc.setLineDashPattern([], 0); doc.rect(15, y - 6, 180, 14, "D");
                    let currentIcon = icons[i % icons.length];
                    let rCount = Math.floor(Math.random() * 5) + 2;
                    doc.text(String(currentIcon + " ").repeat(rCount), 22, y + 2);
                    doc.text("=   [     ]", 155, y + 1.5);
                    y += 18;
                }
                // Tambahan Baris Ujian Teka-Teki Matriks Acak Angka Custom
                y += 5; doc.setFontSize(11);
                for (let j = 0; j < 5; j++) {
                    doc.setDrawColor(240, 240, 240); doc.rect(15, y - 5, 180, 12, "D");
                    let n1 = Math.floor(Math.random() * (maxN - 4)) + 4; let n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
                    doc.text(`Teka-Teki Angka ${j+1} :    ${n1}   +   ${n2}   =   ............`, 22, y + 1.5);
                    doc.setDrawColor(activePrimaryColor); doc.rect(174, y - 3, 6, 6); y += 16;
                }

            } else if (mode === "planner") {
                // KIDS PLANNER (AGENDA HARIAN, TRACKER KEBIASAAN, BELAJAR JAM)
                doc.setDrawColor(activePrimaryColor); doc.setLineDashPattern([], 0);
                doc.setFont("Helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(activeSecondaryColor);
                doc.text("📅 JADWAL HARIAN ANAK PINTAR", 15, 45);
                
                let planY = 55; doc.setFont("Helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(60, 60, 60);
                const agenda = ["06.00 : Bangun Tidur & Rapikan Kasur [  ]", "07.00 : Mandi Pagi & Sarapan Sehat   [  ]", "08.00 : Belajar Menulis & Membaca    [  ]", "12.00 : Makan Siang & Istirahat/Tidur [  ]", "16.00 : Bermain Kreatif & Olahraga   [  ]", "19.00 : Makan Malam & Kumpul Keluarga [  ]"];
                
                agenda.forEach(item => {
                    doc.setDrawColor(230, 230, 230); doc.rect(15, planY - 6, 180, 11);
                    doc.text(item, 20, planY + 1); planY += 16;
                });

                // Gambar Struktur Jam Analogi Untuk Belajar Mengenal Waktu
                doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.5);
                doc.circle(50, 200, 18, "D"); doc.circle(50, 200, 1, "F"); // Lingkaran Jam
                doc.setFont("Helvetica", "bold"); doc.setFontSize(9);
                doc.text("12", 48, 187); doc.text("6", 49, 216); doc.text("3", 64, 201); doc.text("9", 34, 201);
                doc.setFont("Helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(50, 50, 50);
                doc.text("👉 Gambarlah jarum jam menunjukkan pukul 07.00 pagi!", 75, 202);

            } else if (mode === "indonesia") {
                // BAHASA INDONESIA, CERITA ANAK & SAINS DASAR
                doc.setFont("Helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(activeSecondaryColor);
                doc.text("📖 BACALAH CERITA ANAK BERIKUT INI:", 15, 43);
                
                doc.setFont("Helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(70, 70, 70);
                doc.text("Kiko adalah seekor anak kelinci yang sangat ramah. Kiko suka sekali memakan", 15, 50);
                doc.text("wortel segar berwarna oranye dari kebun Pak Tani. Setiap hari Kiko melompat", 15, 55);
                doc.text("dengan gembira bersama teman-temannya di padang rumput hijau luas.", 15, 60);

                doc.setFont("Helvetica", "bold"); doc.setTextColor(activeSecondaryColor);
                doc.text("🔬 KUIS PEMAHAMAN & SAINS CILIK:", 15, 75);
                
                let bY = 85; doc.setFont("Helvetica", "normal"); doc.setTextColor(40, 40, 40);
                for(let i=0; i<totalQ; i++) {
                    let sText = DB_BAHASA[i % DB_BAHASA.length];
                    doc.setDrawColor(240, 240, 240); doc.rect(15, bY - 5, 180, 12, "D");
                    doc.text(`Pertanyaan ${i + 1}: ${sText}`, 20, bY + 2); bY += 18;
                }

            } else if (mode === "english") {
                // ENGLISH FLASHCARD, HEWAN, BUAH, SAYUR, PROFESI, BENDA, KENDARAAN
                const flashcards = [
                    {m: "HEWAN (Animal)  : Kucing", e: "C A T"}, {m: "BUAH (Fruit)    : Apel", e: "A P P L E"},
                    {m: "SAYUR (Vegetable): Wortel", e: "C A R R O T"}, {m: "PROFESI (Job)   : Dokter", e: "D O C T O R"},
                    {m: "BENDA (Object)   : Buku", e: "B O O K"}, {m: "KENDARAAN (Car)  : Mobil", e: "C A R"}
                ];
                let fY = 46; doc.setFontSize(10);
                flashcards.forEach((fc, idx) => {
                    doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.3); doc.setLineDashPattern([], 0);
                    doc.rect(15, fY - 5, 180, 16); // Bingkai Flashcard
                    doc.setFillColor(250, 250, 250); doc.rect(15, fY - 5, 45, 16, "F"); // Kolom Label
                    
                    doc.setFont("Helvetica", "bold"); doc.text(`KARTU ${idx+1}`, 20, fY + 5);
                    doc.setFont("Helvetica", "normal"); doc.text(fc.m, 65, fY + 2);
                    
                    doc.setFont("Courier", "bold"); doc.setFontSize(13); doc.setTextColor(150, 150, 150);
                    doc.text(`Tracing -> [ ${fc.e} ]`, 65, fY + 9);
                    
                    doc.setFont("Helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(40, 40, 40);
                    fY += 22;
                });

            } else if (mode === "creative") {
                // BUSY BOOK PAGES, MEWARNAI, ORIGAMI & GUNTUNG TEMPEL MOTORIK
                doc.setFont("Helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(activeSecondaryColor);
                doc.text("✂️ HALAMAN BUSY BOOK: GUNTUNG & TEMPEL POLA ORIGAMI SIMETRIS", 15, 45);
                
                // Menggambar Area Garis Putus-Putus Sebagai Panduan Menggunting Anak
                doc.setDrawColor(120, 120, 120); doc.setLineWidth(0.4); doc.setLineDashPattern([2, 2], 0);
                doc.rect(20, 55, 60, 60); // Kotak Pola Lipat A
                doc.rect(120, 55, 60, 60); // Kotak Pola Lipat B
                
                doc.setFont("Helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(130, 130, 130);
                doc.text("Gunting Garis Ini (Pola A)", 32, 85); doc.text("Gunting Garis Ini (Pola B)", 132, 85);

                doc.setLineDashPattern([], 0); doc.setFont("Helvetica", "bold"); doc.setTextColor(activeSecondaryColor);
                doc.text("🎨 KANVAS MEWARNAI & GAMBAR KOTAK MOTORIK HALUS", 15, 135);
                
                // Membuat struktur grid kotak menggambar seni
                doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.2);
                let gX = 15, gY = 145;
                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 18; c++) {
                        doc.rect(gX, gY, 10, 10); gX += 10;
                    }
                    gX = 15; gY += 10;
                }
            }

            // FOOTER BRANDING PREMIUM NO-API FILE
            doc.setFont("Helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(150, 150, 150); doc.setLineDashPattern([], 0);
            doc.text(`Kids Worksheet & Mega Planner Book Bundle Engine v6.0 PRO - Hak Cipta Komersial Koh Ojiek Jambi`, 15, 286);
            doc.save(`Mega_Bundle_v6_${mode.toUpperCase()}.pdf`);
        }

        toggleInputs();
    </script>
</body>
</html>
