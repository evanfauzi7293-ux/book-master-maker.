<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet Creator ULTIMATE v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .pro-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-trace { font-family: 'Courier New', Courier, monospace; letter-spacing: 6px; font-weight: bold; text-transform: uppercase; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col justify-between">

    <!-- MAIN DASHBOARD -->
    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2">
        <!-- PANEL KONTROL KIRI -->
        <div class="lg:col-span-5 pro-card p-5 rounded-2xl space-y-4">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <div>
                    <h1 class="text-md font-bold bg-gradient-to-r from-amber-400 via-pink-500 to-emerald-400 bg-clip-text text-transparent uppercase tracking-wider">Worksheet Ultimate v5.0</h1>
                    <p class="text-[10px] text-gray-400">Professional Layout Engine by Koh Ojiek</p>
                </div>
                <span class="text-[9px] bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-2 py-0.5 rounded-full font-bold">
                    LAYOUT PRO
                </span>
            </div>

            <!-- KODE LISENSI -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Kode Akses Premium / Lisensi</label>
                <input type="password" id="licenseKey" placeholder="Masukkan kode lisensi..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
            </div>

            <!-- PILIHAN MATA PELAJARAN / AKTIVITAS LAYOUT -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Pilih Kategori Aktivitas & Layout</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white font-medium">
                    <option value="tracing">📋 Layout A: Tracing Nama Sendiri (Buku Garis Halus)</option>
                    <option value="alfabet">🔤 Layout B: Tracing Huruf A-Z & Kotak Mewarnai</option>
                    <option value="bahasa">📝 Layout C: Bahasa Indonesia (Melengkapi Kalimat Berbingkai)</option>
                    <option value="math">🧮 Layout D: Matematika (Kotak Angka Berpola Acak)</option>
                </select>
            </div>

            <!-- DATA CONFIG CONFIG -->
            <div class="space-y-3 bg-gray-950/40 p-3.5 border border-gray-900 rounded-xl">
                <div id="inputTracingGroup" class="space-y-1">
                    <label class="text-[11px] text-gray-400 block font-medium">Nama / Teks Anak</label>
                    <input type="text" id="childName" maxlength="12" value="EVAN" placeholder="Contoh: EVAN..." class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white uppercase font-bold" oninput="updateLivePreview()">
                </div>

                <div id="customMatrixGroup" class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400 block font-medium">Jumlah Baris Soal</label>
                        <select id="totalQuestions" onchange="updateLivePreview()" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-2 py-2 text-xs text-white">
                            <option value="5">5 Baris</option>
                            <option value="8">8 Baris</option>
                            <option value="10" selected>10 Baris Lengkap</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400 block font-medium">Batas Angka Maks</label>
                        <input type="number" id="maxMatrixNumber" value="20" min="10" max="100" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white font-bold" oninput="updateLivePreview()">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] text-gray-400 block font-medium">Teks Perintah Instruksi</label>
                    <input type="text" id="instructionText" value="Yuk, belajar menebalkan namamu sendiri dengan rapi!" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-amber-500 text-white" oninput="updateLivePreview()">
                </div>
            </div>

            <!-- TEMA WARNA -->
            <div class="space-y-1">
                <label class="text-[11px] text-gray-400 block font-medium">Pilih Warna Lembar Kerja</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] font-bold py-1.5 rounded-lg">💛 Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] font-bold py-1.5 rounded-lg">💙 Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/10 text-pink-400 border border-pink-500/20 text-[10px] font-bold py-1.5 rounded-lg">💗 Pink</button>
                </div>
            </div>

            <button type="button" onclick="downloadUltimateLayoutPDF()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-bold py-3 px-4 rounded-xl text-xs shadow-lg uppercase tracking-wider">
                <i class="fa-solid fa-file-pdf mr-1"></i> CETAK MODUL PREMIUM (A4)
            </button>
        </div>

        <!-- PANEL PREVIEW LIVE -->
        <div class="lg:col-span-7 pro-card p-5 rounded-2xl flex flex-col h-[580px]">
            <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                <h3 class="text-xs font-semibold text-gray-300">Live Layout Premium (Kertas A4)</h3>
                <div id="themeIndicator" class="text-[9px] border px-2 py-0.5 rounded text-amber-400 border-amber-500/30">Tema: AMBER</div>
            </div>
            
            <div class="flex-1 bg-white rounded-xl p-5 text-gray-900 overflow-y-auto border-2 border-gray-300 space-y-4 shadow-inner custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-2 flex justify-between items-center">
                    <div>
                        <h2 id="previewTitle" class="text-sm font-black text-amber-600">LEMBAR LATIHAN MENULIS NAMA</h2>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-medium italic mt-1">Yuk, belajar menebalkan namamu sendiri dengan rapi!</p>
                    </div>
                    <div class="text-[9px] text-gray-400 border p-1 rounded font-mono bg-gray-50">A4 Portrait</div>
                </div>

                <div class="space-y-3 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const DAFTAR_LISENSI_VALID = ["MASTERPRO2026", "CUANMAKSIMAL", "OJIEKCREATIVE"];
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        const DB_BAHASA = ["Budi bermain (bola/buku) di lapangan.", "Ibu memasak di (dapur/kamar).", "Gajah adalah hewan yang (besar/kecil).", "Adik minum (susu/batu) setiap pagi.", "Matahari terbit di sebelah (timur/barat)."];

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            
            document.getElementById("inputTracingGroup").style.display = (mode === "tracing" || mode === "alfabet") ? "block" : "none";

            if (mode === "tracing") instInput.value = "Yuk, belajar menebalkan namamu sendiri dengan rapi pada garis panduan!";
            else if (mode === "alfabet") instInput.value = "Tebalkan huruf besar dan kecil berikut, lalu warnai kotak kosong di atas!";
            else if (mode === "bahasa") instInput.value = "Isilah bagian kalimat yang kosong menggunakan kata di dalam kurung!";
            else if (mode === "math") instInput.value = "Hitunglah hasil operasi penjumlahan dan pengurangan angka di bawah ini!";
        }

        function setTheme(name, hex1, hex2) {
            activeThemeName = name; activePrimaryColor = hex1; activeSecondaryColor = hex2;
            document.getElementById("themeIndicator").innerText = `Tema: ${name.toUpperCase()}`;
            document.getElementById("headerBox").style.borderColor = hex1;
            document.getElementById("previewTitle").style.color = hex2;
            updateLivePreview();
        }

        function updateLivePreview() {
            const mode = document.getElementById("workMode").value;
            const container = document.getElementById("previewContainer");
            const titleText = document.getElementById("previewTitle");
            
            document.getElementById("previewInstruction").innerText = document.getElementById("instructionText").value;

            if (mode === "tracing" || mode === "alfabet") {
                titleText.innerText = mode === "tracing" ? "LATIHAN MENULIS MODEL BUKU HALUS" : "TRACING HURUF ALFABET & KOTAK SENI";
                const name = document.getElementById("childName").value.trim().toUpperCase() || "EVAN";
                container.innerHTML = `
                    <div class='border-2 p-3 rounded-lg border-dashed bg-gray-50 space-y-2'>
                        <div class='text-center text-xs text-gray-400 font-mono'>[ Area Kotak Gambar Visual Atas ]</div>
                        <div class='border-b-2 border-dashed font-trace text-md text-gray-500 text-center tracking-widest bg-white py-2'>${name}</div>
                    </div>`;
            } else {
                titleText.innerText = `MODUL LATIHAN EVALUASI`;
                container.innerHTML = `<div class='text-xs text-gray-400 font-mono p-4 border text-center rounded bg-gray-50'>[ Layout Tata Letak Kolom Kertas Kotak Eksklusif Aktif ]</div>`;
            }
        }

        function downloadUltimateLayoutPDF() {
            const lic = document.getElementById("licenseKey").value.trim();
            const mode = document.getElementById("workMode").value;
            const inst = document.getElementById("instructionText").value.trim();
            const childName = document.getElementById("childName").value.trim().toUpperCase() || "ANAK";
            const totalQ = parseInt(document.getElementById("totalQuestions").value);
            const maxN = parseInt(document.getElementById("maxMatrixNumber").value) || 20;

            if (!lic || !DAFTAR_LISENSI_VALID.includes(lic)) { alert("Kode Lisensi Akses Premium Salah!"); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            // 🎨 DOUBLE BORDER HIASAN FRAME MODUL PREMIUM
            doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.4); doc.rect(8, 8, 194, 281);
            doc.setDrawColor(230, 230, 230); doc.setLineWidth(0.2); doc.rect(9.5, 9.5, 191, 278);

            // HEADER STRIP
            doc.setFillColor(activePrimaryColor); doc.rect(15, 15, 180, 2.5, "F");
            
            // JUDUL MODUL
            doc.setFont("Helvetica", "bold"); doc.setFontSize(14); doc.setTextColor(activeSecondaryColor);
            let pTitle = "SERI MODUL BELAJAR ANAK PINTAR";
            if (mode === "tracing") pTitle = `BUKU HALUS MENULIS: ${childName}`;
            if (mode === "alfabet") pTitle = `PANDUAN TRACING HURUF ALFABET & MEWARNAI`;
            if (mode === "bahasa") pTitle = "EVALUASI KURIKULUM: BAHASA INDONESIA";
            if (mode === "math") pTitle = "MATEMATIKA LOGIKA: KOTAK ANGKA ACAK";
            doc.text(pTitle, 15, 23);

            // INSTRUKSI
            doc.setFont("Helvetica", "oblique"); doc.setFontSize(8.5); doc.setTextColor(100, 100, 100);
            doc.text(inst, 15, 29);
            doc.setDrawColor(200, 200, 200); doc.setLineDashPattern([2, 2], 0); doc.line(15, 33, 195, 33);

            // ----------------------------------------------------
            // CORE STRUKTUR ARCHITECTURE LAYOUT
            // ----------------------------------------------------
            if (mode === "tracing") {
                // MODEL 1: KOTAK AKTIVITAS ATAS + BARIS GARIS BANTU BUKU HALUS DI BAWAH
                doc.setDrawColor(activePrimaryColor); doc.setLineDashPattern([], 0); doc.setLineWidth(0.3);
                doc.rect(15, 40, 180, 50); // Kotak Menggambar Atas
                doc.setFont("Helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(160, 160, 160);
                doc.text("[ Tempel Foto atau Gambar Kreatif Anak di Sini ]", 70, 66);

                let lineY = 110;
                doc.setFont("Courier", "bold"); doc.setFontSize(24); doc.setTextColor(190, 190, 190);
                const spacedName = childName.split("").join("  ");

                for (let i = 0; i < 6; i++) {
                    // Struktur 3 Garis Penuntun Buku Halus Tradisional
                    doc.setDrawColor(180, 200, 240); doc.line(15, lineY - 6, 195, lineY - 6); // Garis Atas
                    doc.setDrawColor(140, 160, 220); doc.line(15, lineY, 195, lineY);     // Garis Tengah (Garis Utama Huruf)
                    doc.setDrawColor(180, 200, 240); doc.line(15, lineY + 4, 195, lineY + 4); // Garis Bawah
                    
                    doc.text(spacedName, 22, lineY + 1.5);
                    lineY += 26;
                }

            } else if (mode === "alfabet") {
                // MODEL 2: ALFABET CORE MATRIX BOX LAYOUT (A SAMPAI Z)
                let boxX = 15, boxY = 40;
                doc.setFont("Courier", "bold"); doc.setFontSize(16); doc.setTextColor(150, 150, 150);

                const alfabetArr = ["Aa", "Bb", "Cc", "Dd", "Ee", "Ff", "Gg", "Hh", "Ii", "Jj", "Kk", "Ll", "Mm", "Nn", "Oo", "Pp", "Qq", "Rr", "Ss", "Tt", "Uu", "Vv", "Ww", "Xx", "Yy", "Zz"];
                
                alfabetArr.forEach((char, index) => {
                    // Kotak Hiasan Alfabet
                    doc.setDrawColor(220, 220, 220); doc.setLineDashPattern([], 0); doc.rect(boxX, boxY, 33, 16);
                    
                    // Angka Indeks Kecil
                    doc.setFont("Helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(200, 200, 200);
                    doc.text((index + 1).toString(), boxX + 2, boxY + 4);

                    // Teks Huruf Tracing Putus-putus pudar
                    doc.setFont("Courier", "bold"); doc.setFontSize(14); doc.setTextColor(170, 170, 170);
                    doc.text(char, boxX + 10, boxY + 10);

                    boxX += 36;
                    if ((index + 1) % 5 === 0) { boxX = 15; boxY += 20; }
                });

            } else if (mode === "bahasa") {
                // MODEL 3: KOLOM SOAL BERBINGKAI EKSKLUSIF BERGARIS TENGAH
                let itemY = 42; doc.setFont("Helvetica", "bold"); doc.setFontSize(11);
                for (let i = 0; i < totalQ; i++) {
                    let soal = DB_BAHASA[i % DB_BAHASA.length];
                    doc.setDrawColor(235, 235, 235); doc.setLineDashPattern([], 0); doc.setFillColor(253, 253, 253);
                    doc.rect(15, itemY - 6, 180, 14, "F"); doc.rect(15, itemY - 6, 180, 14, "D");
                    
                    // Garis variasi samping kolom soal
                    doc.setFillColor(activePrimaryColor); doc.rect(15, itemY - 6, 2, 14, "F");

                    doc.setTextColor(50, 50, 50);
                    doc.text(`No ${i + 1}.  ${soal}`, 22, itemY + 2.5);
                    itemY += 19;
                }

            } else if (mode === "math") {
                // MODEL 4: KOTAK ARSITEKTUR MATEMATIKA MULTI-MATRIX
                let mathY = 45; doc.setFont("Helvetica", "bold"); doc.setFontSize(13);
                for (let i = 1; i <= totalQ; i++) {
                    doc.setDrawColor(230, 230, 230); doc.setLineDashPattern([], 0);
                    doc.rect(15, mathY - 7, 180, 13);
                    
                    let n1 = Math.floor(Math.random() * (maxN - 4)) + 4;
                    let n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
                    let isPlus = Math.random() > 0.5;

                    let qStr = isPlus ? `Peluang ${i} :   ${n1}   +   ${n2}   =   ...............` : `Peluang ${i} :   ${n1}   -   ${n2}   =   ...............`;
                    doc.text(qStr, 24, mathY + 1.5);

                    // Kotak tempat anak menulis angka jawaban di kanan halaman cetak
                    doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.4);
                    doc.rect(174, mathY - 4.5, 8, 8);
                    mathY += 19;
                }
            }

            // FOOTER PREMIUM
            doc.setFont("Helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(160, 160, 160); doc.setLineDashPattern([], 0);
            doc.text(`Kids Worksheet Professional Layout Engine v5.0 - Hak Cipta Komersial Koh Ojiek Jambi`, 15, 284);
            doc.save(`Modul_Premium_Layout_v5_${mode}.pdf`);
        }

        toggleInputs();
    </script>
</body>
</html>
