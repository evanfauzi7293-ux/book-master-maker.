<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Master Maker 6.1 - Ultimate Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .pro-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col justify-between">

    <main class="max-w-5xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-4">
        <div class="lg:col-span-5 pro-card p-6 rounded-2xl space-y-5">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <div>
                    <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-pink-500 bg-clip-text text-transparent">Ebook Master Maker</h1>
                    <p class="text-[10px] text-gray-400">v6.1 Smart Auth Engine by Koh Ojiek</p>
                </div>
                <span id="statusBadge" class="text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-full font-medium">
                    Mode PRO Aktif
                </span>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs text-gray-400 block font-medium">Gemini API Key / Token (Mendukung AIzaSy & AQ.)</label>
                <div class="relative">
                    <input type="password" id="apiKey" placeholder="Tempel kode AQ. atau AIzaSy Anda..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl pl-4 pr-10 py-2.5 text-xs focus:outline-none focus:border-indigo-500 text-white">
                    <button type="button" onclick="toggleVisibility('apiKey')" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-300">
                        <i class="fa-solid fa-eye text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-3">
                <div class="space-y-1.5">
                    <label class="text-xs text-gray-400 block font-medium">Judul Ebook</label>
                    <input type="text" id="bookTitle" placeholder="Contoh: Panduan Sukses..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:border-indigo-500 text-white">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5">
                        <label class="text-xs text-gray-400 block font-medium">Target Pembaca</label>
                        <input type="text" id="targetAudience" placeholder="Contoh: Pemula..." class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:border-indigo-500 text-white">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs text-gray-400 block font-medium">Target Halaman</label>
                        <input type="number" id="targetPages" value="5" min="5" max="500" class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:border-indigo-500 text-center text-white">
                    </div>
                </div>
            </div>

            <div class="pt-2 space-y-2">
                <button type="button" onclick="generateOutline()" class="w-full bg-gray-800 hover:bg-gray-750 text-indigo-400 border border-indigo-500/20 font-medium py-2.5 px-4 rounded-xl text-xs transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-sitemap"></i> 1. Susun Struktur & Outline
                </button>
                <button type="button" onclick="generateFullBook()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition shadow-lg shadow-emerald-600/25 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 2. Tulis & Generate Seluruh Isi Ebook
                </button>
            </div>
        </div>

        <div class="lg:col-span-7 pro-card p-6 rounded-2xl flex flex-col h-[520px]">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3 mb-4">
                <h3 class="text-sm font-semibold tracking-wide text-gray-300">Live Workspace Output</h3>
                <button type="button" onclick="downloadAsPDF()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-[11px] font-medium px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition">
                    <i class="fa-solid fa-file-pdf text-red-400"></i> Download PDF
                </button>
            </div>
            <div id="workspaceOutput" class="flex-1 overflow-y-auto custom-scrollbar text-xs text-gray-400 bg-gray-950/40 border border-gray-900 rounded-xl p-4 font-mono space-y-2 leading-relaxed">
                [Engine v6.1 Ready] Masukkan kode kunci Anda, ketik judul, lalu klik Susun Struktur...
            </div>
        </div>
    </main>

    <footer class="text-center text-[10px] text-gray-600 mt-8">
        &copy; 2026 Ebook Master Maker PRO v6.1. Hak Cipta Dilindungi. Dikembangkan oleh Koh Ojiek Jambi.
    </footer>

    <script>
        function toggleVisibility(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        // Fungsi pintar untuk mendeteksi tipe dan menyusun Headers request ke Google
        function buildRequestSetup(apiKey) {
            let url = "";
            let headers = { "Content-Type": "application/json" };

            if (apiKey.startsWith("AIzaSy")) {
                // Jika kunci tipe lama (API Key resmi)
                url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            } else {
                // Jika kunci tipe AQ. (OAuth Access Token) -> Diarahkan ke jalur v1 stabil resmi tanpa key param
                url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent`;
                headers["Authorization"] = `Bearer ${apiKey}`;
            }
            return { url, headers };
        }

        async function generateOutline() {
            const apiKeyInput = document.getElementById("apiKey").value;
            const apiKey = apiKeyInput.trim(); 
            const title = document.getElementById("bookTitle").value;
            const audience = document.getElementById("targetAudience").value;
            const output = document.getElementById("workspaceOutput");

            if (!apiKey) { alert("Masukkan Kunci API / Token!"); return; }
            if (!title) { alert("Judul wajib diisi!"); return; }

            output.innerHTML = "<span class='text-indigo-400 animate-pulse'>[System] Memproses struktur data dengan Autentikasi Otomatis...</span>";

            try {
                const setup = buildRequestSetup(apiKey);
                
                const response = await fetch(setup.url, {
                    method: "POST",
                    headers: setup.headers,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Buatkan outline struktur bab buku yang sangat mendalam dan profesional untuk judul: "${title}" dengan target pembaca: "${audience}". Tulis dalam Bahasa Indonesia.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    output.innerHTML = `<span class='text-red-400'>[Respon Error Google]:<br>Pesan: ${data.error.message}</span>`;
                    return;
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    output.innerHTML = "<span class='text-red-400'>[Error] Gagal mengekstrak data teks respons.</span>";
                }
            } catch (err) {
                output.innerText = "[Error Jaringan/Koneksi]: " + err.message;
            }
        }

        async function generateFullBook() {
            const apiKeyInput = document.getElementById("apiKey").value;
            const apiKey = apiKeyInput.trim(); 
            const title = document.getElementById("bookTitle").value;
            const output = document.getElementById("workspaceOutput");

            if (!apiKey) { alert("Kunci API / Token wajib diisi!"); return; }

            output.innerHTML = "<span class='text-emerald-400 animate-pulse'>[AI Writing] AI sedang menulis isi buku lengkap secara otomatis...</span>";

            try {
                const setup = buildRequestSetup(apiKey);
                
                const response = await fetch(setup.url, {
                    method: "POST",
                    headers: setup.headers,
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Bertindaklah sebagai penulis buku profesional. Tuliskan naskah isi buku yang lengkap, detail, panjang, dan komprehensif tanpa terputus untuk judul "${title}". Hasilkan konten naratif penuh dari bab awal hingga kesimpulan. Tulis dalam Bahasa Indonesia.` }] }]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    output.innerHTML = `<span class='text-red-400'>[Respon Error Google]:<br>Pesan: ${data.error.message}</span>`;
                    return;
                }
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (err) {
                output.innerText = "[Error Jaringan/Koneksi]: " + err.message;
            }
        }

        function downloadAsPDF() {
            const outputText = document.getElementById("workspaceOutput").innerText;
            const title = document.getElementById("bookTitle").value || "Ebook_Draft";
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("Helvetica", "normal");
            doc.setFontSize(11);
            const splitText = doc.splitTextToSize(outputText, 180);
            let y = 20;
            splitText.forEach(line => {
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(line, 15, y);
                y += 6;
            });
            doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
