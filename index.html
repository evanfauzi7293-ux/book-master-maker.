<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet & Planner Creator v10.1 (Hijaiyah Patch)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        body { 
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 40%),
                        #030712;
            color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
        }
        .glass-panel { background: rgba(17, 24, 39, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); }
        .floating-paper { background: #ffffff; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2 relative z-10">
        
        <div class="lg:col-span-5 glass-panel p-5 rounded-3xl space-y-4 max-h-[88vh] overflow-y-auto custom-scrollbar">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-pink-400 to-amber-300 bg-clip-text text-transparent uppercase">Worksheet Studio</h1>
                    <p class="text-[11px] text-gray-400 font-medium tracking-wide mt-0.5">v10.1 Engine Engine</p>
                </div>
                <div id="statusBadge" class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold tracking-wide">DEMO MODE ACTIVE</div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl border-l-4 border-l-indigo-500/60 space-y-3">
                <label class="text-[11px] text-indigo-400 font-bold uppercase block"><i class="fa-solid fa-keyhole mr-1"></i> Mode Aktivasi Lisensi</label>
                <div class="grid grid-cols-3 gap-1.5 text-[10px] font-bold">
                    <button type="button" id="btnModeDemo" onclick="switchLicenseMode('demo')" class="bg-indigo-600 text-white py-2 rounded-xl transition-all">Demo Mode</button>
                    <button type="button" id="btnModePersonal" onclick="switchLicenseMode('personal')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">Personal Use</button>
                    <button type="button" id="btnModeMrr" onclick="switchLicenseMode('mrr')" class="bg-gray-800 text-gray-400 py-2 rounded-xl transition-all">MRR Master</button>
                </div>

                <div id="keyInputContainer" class="hidden space-y-2 pt-1 border-t border-gray-800/60">
                    <label id="keyInputLabel" class="text-[10px] text-gray-400 block">Masukkan Kunci Lisensi:</label>
                    <div class="flex gap-2">
                        <input type="password" id="configPersonalKey" placeholder="••••••••••••••" class="flex-1 bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white tracking-widest outline-none font-mono">
                        <button type="button" onclick="simpanKunciAktivasi()" class="bg-indigo-600 text-white font-bold px-4 py-1.5 rounded-xl text-xs">Aktifkan</button>
                    </div>
                </div>

                <div class="border-t border-gray-800/60 pt-2 flex flex-col gap-1.5">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="email" id="mrrEmail" placeholder="Email Terdaftar..." class="w-full bg-gray-950/20 border border-gray-800/80 rounded-xl px-2.5 py-1 text-[11px] text-gray-300 outline-none">
                        <input type="text" id="mrrPhone" placeholder="No HP/WhatsApp..." class="w-full bg-gray-950/20 border border-gray-800/80 rounded-xl px-2.5 py-1 text-[11px] text-gray-300 outline-none">
                    </div>
                    <button type="button" onclick="resetPasswordEngine()" class="w-full bg-gray-900 text-gray-400 text-[10px] py-1 rounded-lg"><i class="fa-solid fa-rotate-left mr-1"></i> Reset Lisensi Mandiri (Default)</button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Kategori Modul Aktivitas Anak</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-950/60 border border-gray-800 focus:border-indigo-500 rounded-xl px-3 py-2 text-xs text-gray-200 outline-none font-medium">
                    <optgroup label="🎨 Modul Mewarnai Tematik">
                        <option value="mewarnai_hewan">🎨 Mewarnai Ragam Hebat Hewan Lucu</option>
                        <option value="mewarnai_buah">🍓 Mewarnai Buah-Buahan Segar</option>
                        <option value="mewarnai_kendaraan">🚗 Mewarnai Aneka Transportasi & Mobil</option>
                        <option value="mewarnai_dino">🦖 Mewarnai Petualangan Dunia Dinosaurus</option>
                    </optgroup>
                    <optgroup label="✍️ Modul Tracing & Menulis Dasar">
                        <option value="trace_alphabet">🇬🇧 Tracing Alphabet Seru (Huruf A-Z)</option>
                        <option value="trace_angka">🔢 Tracing Angka Matematika Dasar (1-20)</option>
                        <option value="hijaiyah" selected>🕌 Menulis & Tracing Huruf Hijaiyah</option>
                        <option value="belajar_bentuk">📐 Mengenal & Tracing Bentuk Geometri</option>
                    </optgroup>
                    <optgroup label="🧠 Modul Kognitif & Logika Kecerdasan">
                        <option value="labirin_laut">🦈 Labirin Petualangan Mencari Jalan</option>
                        <option value="math_100">🧮 Penjumlahan & Berhitung Maksi (1-100)</option>
                        <option value="suku_kata">📝 Membaca & Mengeja Suku Kata Dasar</option>
                        <option value="mencari_perbedaan">🔍 Detektif Cilik: Mencari Perbedaan Gambar</option>
                        <option value="mencocokkan_bayangan">👥 Mencocokkan Siluet & Bayangan Objek</option>
                        <option value="dot_to_dot">✏️ Dot-to-Dot: Menghubungkan Titik Angka</option>
                        <option value="flashcard_kosakata">💡 Flashcard Edukasi Kosakata Pintar</option>
                    </optgroup>
                </select>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Ukuran Kertas</label>
                        <select id="paperSize" onchange="updateLivePreview()" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white outline-none">
                            <option value="a4" selected>A4 Standard</option>
                            <option value="f4">F4 / Folio</option>
                            <option value="a5">A5 Buku Kecil</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-400">Jumlah Cetak Lembar</label>
                        <select id="totalPdfPages" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-2.5 py-1.5 text-xs text-white font-mono font-bold">
                            <script>for(let i=1; i<=25; i++) { document.write(`<option value="${i}" ${i===5?'selected':''}>${i} Lembar</option>`); }</script>
                        </select>
                    </div>
                </div>
            </div>

            <div class="glass-card p-3.5 rounded-2xl space-y-3">
                <div class="space-y-1.5">
                    <label class="text-[11px] text-gray-300 font-semibold">Teks Instruksi Kerja</label>
                    <input type="text" id="instructionText" value="Mari menebalkan huruf Hijaiyah Alif Ba Ta berikut dengan rapi!" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-2 text-xs text-gray-300 outline-none" oninput="updateLivePreview()">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] text-gray-300 font-semibold px-0.5">Pilih Warna Aksen Dokumen</label>
                <div class="grid grid-cols-5 gap-1 text-[10px] font-bold">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 py-1.5 rounded-lg">Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/10 text-blue-400 border border-blue-500/20 py-1.5 rounded-lg">Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/10 text-pink-400 border border-pink-500/20 py-1.5 rounded-lg">Pink</button>
                    <button type="button" onclick="setTheme('emerald', '#10b981', '#047757')" class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 py-1.5 rounded-lg">Green</button>
                    <button type="button" onclick="setTheme('purple', '#a855f7', '#7e22ce')" class="bg-purple-500/10 text-purple-400 border border-purple-500/20 py-1.5 rounded-lg">Purple</button>
                </div>
            </div>

            <button id="btnGenerate" type="button" onclick="downloadMasterV97PDF()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-extrabold py-3.5 rounded-xl text-xs tracking-widest uppercase shadow-lg">
                <i class="fa-solid fa-sparkles mr-2"></i> GENERATE DOCUMENT
            </button>
        </div>

        <div class="lg:col-span-7 glass-panel p-5 rounded-3xl flex flex-col h-[88vh]">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3 mb-3">
                <h3 class="text-xs font-bold uppercase text-gray-400"><i class="fa-solid fa-expand text-indigo-400 mr-2"></i> Live Digital Screen Proof</h3>
                <div id="sizeIndicator" class="text-[10px] font-mono text-indigo-400 bg-indigo-500/5 px-2.5 py-0.5 border border-indigo-500/15 rounded-full">UKURAN: A4</div>
            </div>
            
            <div class="flex-1 floating-paper rounded-2xl p-5 text-gray-900 overflow-y-auto border border-gray-200 space-y-4 shadow-2xl custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-3 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span id="previewMaskot" class="text-2xl">🕌</span>
                            <h2 id="previewTitle" class="text-sm font-black text-amber-600 uppercase">LEMBAR AKTIVITAS</h2>
                        </div>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-semibold italic mt-1 leading-relaxed"></p>
                    </div>
                    <div id="badgeLicensePreview" class="text-[9px] text-amber-600 border px-2 py-0.5 rounded-md font-mono font-black bg-amber-50">DEMO MODE</div>
                </div>
                <div class="space-y-3 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const DEFAULT_PERSONAL_KEY = "ANAKPINTAR2026";
        const DEFAULT_MRR_KEY = "MASTERPRO2026";
        let selectedGateMode = "demo", isAuthorized = true; 
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        function switchLicenseMode(mode) {
            selectedGateMode = mode;
            const btnDemo = document.getElementById("btnModeDemo");
            const btnPersonal = document.getElementById("btnModePersonal");
            const btnMrr = document.getElementById("btnModeMrr");
            const keyContainer = document.getElementById("keyInputContainer");
            const keyLabel = document.getElementById("keyInputLabel");
            const inputField = document.getElementById("configPersonalKey");

            [btnDemo, btnPersonal, btnMrr].forEach(btn => btn.className = "bg-gray-800 text-gray-400 py-2 rounded-xl transition-all");

            if (mode === "demo") { btnDemo.className = "bg-indigo-600 text-white py-2 rounded-xl"; keyContainer.classList.add("hidden"); isAuthorized = true; }
            else if (mode === "personal") { btnPersonal.className = "bg-blue-600 text-white py-2 rounded-xl"; keyContainer.classList.remove("hidden"); keyLabel.innerText = "Kunci Lisensi Personal Use:"; inputField.value = localStorage.getItem("LAST_TYPED_KEY_PERSONAL") || DEFAULT_PERSONAL_KEY; }
            else if (mode === "mrr") { btnMrr.className = "bg-emerald-600 text-white py-2 rounded-xl"; keyContainer.classList.remove("hidden"); keyLabel.innerText = "Kunci Lisensi MRR Enterprise:"; inputField.value = localStorage.getItem("LAST_TYPED_KEY_MRR") || DEFAULT_MRR_KEY; }
            validasiProsesKunci();
        }

        function validasiProsesKunci() {
            if (selectedGateMode === "demo") { isAuthorized = true; evaluasiUIStatus(); return; }
            const inputVal = document.getElementById("configPersonalKey").value.trim().toUpperCase();
            const storedPersonal = (localStorage.getItem("KEY_PERSONAL_CONFIG") || DEFAULT_PERSONAL_KEY).toUpperCase();
            const storedMrr = (localStorage.getItem("KEY_MRR_CONFIG") || DEFAULT_MRR_KEY).toUpperCase();
            isAuthorized = (selectedGateMode === "personal" && (inputVal === DEFAULT_PERSONAL_KEY || inputVal === storedPersonal)) || (selectedGateMode === "mrr" && (inputVal === DEFAULT_MRR_KEY || inputVal === storedMrr));
            evaluasiUIStatus();
        }

        function simpanKunciAktivasi() {
            const inputVal = document.getElementById("configPersonalKey").value.trim();
            if (selectedGateMode === "personal") localStorage.setItem("LAST_TYPED_KEY_PERSONAL", inputVal);
            if (selectedGateMode === "mrr") localStorage.setItem("LAST_TYPED_KEY_MRR", inputVal);
            validasiProsesKunci();
            alert(isAuthorized ? `Sukses! Lisensi ${selectedGateMode.toUpperCase()} Berhasil Diaktifkan.` : "Maaf, Kunci Lisensi salah!");
        }

        function evaluasiUIStatus() {
            const badge = document.getElementById("statusBadge");
            const previewBadge = document.getElementById("badgeLicensePreview");
            const btnGenerate = document.getElementById("btnGenerate");

            if (!isAuthorized) {
                badge.className = "text-[10px] bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full font-bold";
                badge.innerText = "LISENSI INVALID / TERKUNCI";
                previewBadge.className = "text-[9px] text-rose-600 border border-rose-200 px-2 py-0.5 rounded-md bg-rose-50 font-black";
                previewBadge.innerText = "LOCKED";
                btnGenerate.setAttribute("disabled", "true"); btnGenerate.className = "w-full bg-gray-700 text-gray-500 font-extrabold py-3.5 rounded-xl text-xs uppercase cursor-not-allowed opacity-40";
            } else {
                btnGenerate.removeAttribute("disabled"); btnGenerate.className = "w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-extrabold py-3.5 rounded-xl text-xs tracking-widest uppercase shadow-lg";
                if (selectedGateMode === "demo") { badge.className = "text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full font-bold"; badge.innerText = "DEMO MODE ACTIVE"; previewBadge.className = "text-[9px] text-amber-600 border border-amber-200 px-2 py-0.5 rounded-md bg-amber-50 font-black"; previewBadge.innerText = "DEMO MODE (1 PAGE LIMIT)"; }
                else if (selectedGateMode === "personal") { badge.className = "text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full font-bold"; badge.innerText = "PERSONAL USE UNLOCKED"; previewBadge.className = "text-[9px] text-blue-600 border border-blue-200 px-2 py-0.5 rounded-md bg-blue-50 font-black"; previewBadge.innerText = "PERSONAL LICENSE"; }
                else if (selectedGateMode === "mrr") { badge.className = "text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-bold"; badge.innerText = "MRR MASTER UNLOCKED"; previewBadge.className = "text-[9px] text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded-md bg-emerald-50 font-black"; previewBadge.innerText = "MRR MASTER"; }
            }
        }

        function resetPasswordEngine() {
            const email = document.getElementById("mrrEmail").value.trim();
            const phone = document.getElementById("mrrPhone").value.trim();
            if(!email || !phone) { alert("Silakan isi kolom Email dan No HP/WA!"); return; }
            localStorage.setItem("KEY_PERSONAL_CONFIG", DEFAULT_PERSONAL_KEY); localStorage.setItem("KEY_MRR_CONFIG", DEFAULT_MRR_KEY);
            alert("Sistem berhasil mereset sandi toko Anda ke default pabrik."); location.reload();
        }

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            const maskot = document.getElementById("previewMaskot");

            if (mode === "mewarnai_hewan") { instInput.value = "Warnai gambar makhluk hewan laut lucu di bawah ini sesuai imajinasimu!"; maskot.innerText = "🎨"; }
            else if (mode === "mewarnai_buah") { instInput.value = "Warnai buah-buahan segar berikut sesuai dengan kreativitasmu!"; maskot.innerText = "🍓"; }
            else if (mode === "mewarnai_kendaraan") { instInput.value = "Yuk warnai mobil balap sport super cepat ini dengan warna kesukaanmu!"; maskot.innerText = "🚗"; }
            else if (mode === "mewarnai_dino") { instInput.value = "Warnai dinosaurus T-Rex purba raksasa ini agar terlihat keren!"; maskot.innerText = "🦖"; }
            else if (mode === "trace_alphabet") { instInput.value = "Tebalkan huruf abjad putus-putus besar dan kecil di bawah ini!"; maskot.innerText = "🇬🇧"; }
            else if (mode === "trace_angka") { instInput.value = "Ayo belajar menebalkan angka matematika dasar dan hitung objeknya!"; maskot.innerText = "🔢"; }
            else if (mode === "hijaiyah") { instInput.value = "Mari menebalkan huruf Hijaiyah Alif Ba Ta berikut dengan rapi!"; maskot.innerText = "🕌"; }
            else if (mode === "belajar_bentuk") { instInput.value = "Tebalkan garis putus-putus bentuk geometri dasar berikut!"; maskot.innerText = "📐"; }
            else if (mode === "labirin_laut") { instInput.value = "Bantu petualang cilik mencari jalan keluar dari labirin misterius ini!"; maskot.innerText = "🦈"; }
            else if (mode === "math_100") { instInput.value = "Selesaikan kuis operasi penjumlahan bilangan 1 sampai 100 berikut!"; maskot.innerText = "🧮"; }
            else if (mode === "suku_kata") { instInput.value = "Eja, baca, dan tebalkan kombinasi suku kata dasar di bawah ini!"; maskot.innerText = "📝"; }
            else if (mode === "mencari_perbedaan") { instInput.value = "Temukan 5 lingkaran perbedaan tersembunyi antara dua sisi gambar!"; maskot.innerText = "🔍"; }
            else if (mode === "mencocokkan_bayangan") { instInput.value = "Tariklah garis lurus dari gambar objek ke siluet bayangan yang tepat!"; maskot.innerText = "👥"; }
            else if (mode === "dot_to_dot") { instInput.value = "Hubungkan titik-titik nomor 1 sampai 20 untuk membentuk objek rahasia!"; maskot.innerText = "✏️"; }
            else if (mode === "flashcard_kosakata") { instInput.value = "Gunting sepanjang garis putus-putus untuk membuat kartu belajar pintar!"; maskot.innerText = "💡"; }
        }

        function setTheme(name, hex1, hex2) {
            activeThemeName = name; activePrimaryColor = hex1; activeSecondaryColor = hex2;
            document.getElementById("headerBox").style.borderColor = hex1;
            document.getElementById("previewTitle").style.color = hex2; updateLivePreview();
        }

        function updateLivePreview() {
            const mode = document.getElementById("workMode").value;
            const size = document.getElementById("paperSize").value;
            document.getElementById("sizeIndicator").innerText = `UKURAN KERTAS: ${size.toUpperCase()}`;
            document.getElementById("previewInstruction").innerText = document.getElementById("instructionText").value;
            document.getElementById("previewTitle").innerText = mode.replace(/_/g, " ").toUpperCase();

            document.getElementById("previewContainer").innerHTML = `
                <div class="border-2 border-dashed rounded-2xl p-6 text-center bg-gray-50 flex flex-col items-center justify-center min-h-[160px]" style="border-color:${activePrimaryColor}">
                    <span class="text-4xl opacity-50 mb-1">🕌</span>
                    <p class="text-xs font-mono font-bold text-gray-700">[ ENGINE VECTOR ${mode.toUpperCase()} PATCHED ]</p>
                    <p class="text-[10px] text-gray-400 mt-1">Sistem kaligrafi kurva aktif otomatis saat dicetak ke file PDF.</p>
                </div>`;
        }

        // FUNGSI KHUSUS MENGGAMBAR VEKTOR HURUF HIJAIYAH (ANTI FONT CRASH)
        function drawVectorHijaiyah(doc, type, x, y) {
            doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.8);
            
            if (type === 'alif') {
                // Alif: Garis vertikal tegak lurus dengan sedikit lekukan atas
                doc.line(x, y - 12, x, y + 12);
                // Hamzah Kecil di atasnya
                doc.line(x - 2, y - 16, x + 2, y - 16);
                doc.line(x + 2, y - 16, x - 2, y - 19);
            } 
            else if (type === 'ba' || type === 'ta' || type === 'tsa') {
                // Bentuk Perahu / Mangkok dasar Hijaiyah
                doc.line(x - 14, y, x - 12, y + 6); 
                doc.line(x - 12, y + 6, x + 12, y + 6); 
                doc.line(x + 12, y + 6, x + 14, y);
                
                // Distribusi Letak Titik Spesifik Huruf
                if (type === 'ba') {
                    doc.setFillColor(150, 150, 150); doc.circle(x, y + 11, 1.2, "F"); // 1 Titik di Bawah
                } else if (type === 'ta') {
                    doc.setFillColor(150, 150, 150); 
                    doc.circle(x - 3, y + 1, 1.1, "F"); doc.circle(x + 3, y + 1, 1.1, "F"); // 2 Titik di Dalam/Atas
                } else if (type === 'tsa') {
                    doc.setFillColor(150, 150, 150);
                    doc.circle(x - 3, y + 2, 1.1, "F"); doc.circle(x + 3, y + 2, 1.1, "F"); 
                    doc.circle(x, y - 1, 1.1, "F"); // 3 Titik Segitiga
                }
            }
        }

        function downloadMasterV97PDF() {
            if(!isAuthorized) return;
            const mode = document.getElementById("workMode").value;
            const sizeOption = document.getElementById("paperSize").value;
            let maxPages = parseInt(document.getElementById("totalPdfPages").value);
            const instText = document.getElementById("instructionText").value;

            if(selectedGateMode === "demo" && maxPages > 1) {
                alert("Mode Demo: Jumlah halaman dipangkas otomatis menjadi 1 lembar."); maxPages = 1;
            }

            const { jsPDF } = window.jspdf;
            let formatSize = sizeOption === "f4" ? [215, 330] : (sizeOption === "a5" ? "a5" : "a4");
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: formatSize });

            for (let page = 1; page <= maxPages; page++) {
                if (page > 1) doc.addPage();

                let w = sizeOption === "a5" ? 138 : (sizeOption === "f4" ? 205 : 194);
                let h = sizeOption === "a5" ? 200 : (sizeOption === "f4" ? 320 : 281);
                
                doc.setDrawColor(activePrimaryColor); doc.setLineWidth(0.6); doc.rect(8, 8, w, h);
                doc.setFillColor(activePrimaryColor); doc.rect(12, 12, w - 8, 1.5, "F");

                doc.setFont("Helvetica", "bold"); doc.setFontSize(13); doc.setTextColor(activeSecondaryColor);
                doc.text(mode.replace(/_/g, " ").toUpperCase(), 15, 23);
                doc.setFont("Helvetica", "normal"); doc.setFontSize(8.5); doc.setTextColor(70, 70, 70);
                doc.text(`${instText} (Halaman ${page})`, 15, 29);

                let cx = w / 2;
                let cy = h / 2 + 10;

                // LOGIKA RETRIEVAL VECTOR KHUSUS HIJAIYAH (FIXED PATCH)
                if (mode === "hijaiyah") {
                    // 1. Gambar Master Grid Display Atas
                    doc.setDrawColor(230, 230, 230); doc.setLineWidth(0.4);
                    doc.rect(15, 38, w - 14, 45, "D");
                    
                    // Render Huruf Vektor Ukuran Besar sebagai Contoh Utama Anak
                    drawVectorHijaiyah(doc, 'alif', cx - 35, 60);
                    drawVectorHijaiyah(doc, 'ba', cx - 10, 60);
                    drawVectorHijaiyah(doc, 'ta', cx + 18, 60);
                    drawVectorHijaiyah(doc, 'tsa', cx + 45, 60);

                    // 2. Buat Baris Garis Bantu Tracing Putus-Putus ke Bawah
                    let startY = 95;
                    for (let row = 0; row < 5; row++) {
                        doc.setDrawColor(210, 210, 210); doc.line(15, startY + 10, w, startY + 10);
                        
                        // Isi kolom dengan huruf putus-putus menggunakan titik bantu halus
                        drawVectorHijaiyah(doc, 'alif', cx - 35, startY);
                        drawVectorHijaiyah(doc, 'ba', cx - 10, startY);
                        drawVectorHijaiyah(doc, 'ta', cx + 18, startY);
                        drawVectorHijaiyah(doc, 'tsa', cx + 45, startY);

                        startY += 25;
                    }
                } 
                else if (mode === "mewarnai_hewan") {
                    doc.setDrawColor(50, 50, 50); doc.setLineWidth(0.8);
                    doc.circle(cx, cy, 26, "D"); doc.circle(cx - 9, cy - 6, 2.5, "D"); doc.circle(cx + 9, cy - 6, 2.5, "D");
                    doc.line(cx - 26, cy, cx - 42, cy + 5); doc.line(cx + 26, cy, cx + 42, cy + 5);
                } 
                else if (mode === "mewarnai_buah") {
                    doc.setDrawColor(50, 50, 50); doc.setLineWidth(0.8);
                    doc.ellipse(cx, cy, 25, 30, "D"); doc.line(cx, cy - 25, cx - 10, cy - 38);
                } 
                else if (mode === "mewarnai_kendaraan") {
                    doc.setDrawColor(40, 40, 40); doc.setLineWidth(0.8);
                    doc.rect(cx - 35, cy, 70, 18, "D"); doc.rect(cx - 20, cy - 14, 40, 14, "D");
                    doc.circle(cx - 20, cy + 18, 7, "D"); doc.circle(cx + 20, cy + 18, 7, "D");
                } 
                else if (mode === "mewarnai_dino") {
                    doc.setDrawColor(40, 40, 40); doc.setLineWidth(0.8);
                    doc.ellipse(cx, cy + 5, 35, 18, "D"); doc.circle(cx + 22, cy - 18, 10, "D");
                    doc.line(cx + 22, cy - 8, cx + 22, cy - 1); doc.rect(cx - 30, cy + 15, 8, 12, "D"); doc.rect(cx + 15, cy + 15, 8, 12, "D");
                } 
                else if (mode === "trace_alphabet") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(48); doc.setTextColor(220, 220, 220);
                    let arrLetters = ["Aa", "Bb", "Cc", "Dd", "Ee", "Ff", "Gg", "Hh"];
                    let pick = arrLetters[(page - 1) % arrLetters.length];
                    doc.text(pick, cx - 22, cy - 15);
                    doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3);
                    for(let r=0; r<4; r++) {
                        let yLine = cy + (r * 18);
                        doc.line(15, yLine, w, yLine); doc.line(15, yLine + 8, w, yLine + 8);
                        doc.setFontSize(14); doc.setTextColor(210, 210, 210);
                        doc.text(". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .", 18, yLine + 6);
                    }
                } 
                else if (mode === "trace_angka") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(60); doc.setTextColor(230, 230, 230);
                    let numDisplay = ((page - 1) % 20) + 1; doc.text(String(numDisplay), cx - 12, cy - 15);
                    doc.setDrawColor(180, 180, 180);
                    for(let j=0; j<numDisplay && j<10; j++) { doc.circle(25 + (j * 14), cy + 10, 5, "D"); }
                    for(let k=0; k<4; k++) { doc.rect(15 + (k*28), cy + 25, 24, 15, "D"); }
                } 
                else if (mode === "belajar_bentuk") {
                    doc.setDrawColor(120, 120, 120); doc.setLineWidth(0.5);
                    doc.rect(cx - 40, cy - 30, 25, 25, "D"); doc.circle(cx + 25, cy - 17, 13, "D");
                    doc.triangle(cx - 25, cy + 35, cx - 40, cy + 10, cx - 10, cy + 10, "D");
                    doc.ellipse(cx + 25, cy + 22, 20, 12, "D");
                } 
                else if (mode === "labirin_laut") {
                    doc.setDrawColor(60, 60, 60); doc.setLineWidth(0.8);
                    doc.rect(cx - 45, cy - 40, 90, 80, "D"); doc.rect(cx - 30, cy - 25, 60, 50, "D");
                    doc.rect(cx - 15, cy - 10, 30, 20, "D");
                    doc.line(cx - 45, cy - 35, cx - 30, cy - 35); doc.line(cx + 30, cy + 15, cx + 45, cy + 15);
                } 
                else if (mode === "math_100") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(60, 60, 60);
                    let innerY = 44;
                    for (let i = 1; i <= 10; i++) {
                        doc.setDrawColor(240, 240, 240); doc.rect(15, innerY - 4, w - 14, 10, "D");
                        doc.text(`Soal ${i}:      ${35 + i + page}   +   ${12 + i}   =   ...............`, 20, innerY + 3);
                        innerY += 13;
                    }
                } 
                else if (mode === "suku_kata") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(18); doc.setTextColor(80, 80, 80);
                    doc.text("b a - b u  |  c a - c i  |  d a - d u", cx - 45, cy - 20);
                    doc.setDrawColor(200, 200, 200);
                    for(let s=0; s<4; s++) { doc.rect(15, cy - 5 + (s * 15), w - 14, 11, "D"); }
                } 
                else if (mode === "mencari_perbedaan") {
                    doc.setDrawColor(50, 50, 50); doc.rect(15, cy - 35, w/2 - 12, 70, "D"); doc.rect(w/2 + 8, cy - 35, w/2 - 12, 70, "D");
                    doc.circle(35, cy, 10, "D"); doc.circle(w/2 + 28, cy, 10, "D");
                    doc.circle(60, cy + 15, 6, "D");
                } 
                else if (mode === "mencocokkan_bayangan") {
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(11);
                    doc.text("OBJEK ASLI", 20, cy - 32); doc.text("SILUET BAYANGAN", w - 60, cy - 32);
                    for(let m=0; m<3; m++) {
                        doc.setDrawColor(50, 50, 50); doc.rect(20, cy - 20 + (m * 22), 15, 15, "D");
                        doc.setFillColor(30, 30, 30); doc.rect(w - 45, cy - 20 + (((m+1)%3) * 22), 15, 15, "F");
                    }
                } 
                else if (mode === "dot_to_dot") {
                    doc.setDrawColor(40, 40, 40); doc.setFontSize(8);
                    for(let d=1; d<=15; d++) {
                        let dx = cx + 35 * Math.cos((d * 2 * Math.PI) / 15);
                        let dy = cy + 35 * Math.sin((d * 2 * Math.PI) / 15);
                        doc.circle(dx, dy, 0.8, "F"); doc.text(String(d), dx + 2, dy);
                    }
                } 
                else if (mode === "flashcard_kosakata") {
                    doc.setDrawColor(100, 100, 100); doc.setLineWidth(0.4);
                    doc.rect(15, cy - 38, w/2 - 12, 36, "D"); doc.rect(w/2 + 5, cy - 38, w/2 - 12, 36, "D");
                    doc.rect(15, cy + 5, w/2 - 12, 36, "D"); doc.rect(w/2 + 5, cy + 5, w/2 - 12, 36, "D");
                    doc.setFont("Helvetica", "bold"); doc.setFontSize(12); doc.text("APEL", 30, cy - 20); doc.text("SINGA", w - 50, cy - 20);
                }

                doc.setFont("Helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(160, 160, 160);
                doc.text(`Worksheet Studio Premium v10.1 [${selectedGateMode.toUpperCase()}] - Hak Cipta Produk Koh Ojiek`, 15, h + 3);
            }
            doc.save(`Worksheet_${selectedGateMode}_${mode}.pdf`);
        }

        // Boot-up engine
        toggleInputs(); updateLivePreview(); switchLicenseMode('demo');
    </script>
</body>
</html>
