<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Worksheet & Planner Creator v8.7 (Mega-Update)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap');
        
        body { 
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 40%),
                        #030712;
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .floating-paper {
            background: #ffffff;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(99, 102, 241, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .font-trace { 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 4px; 
            font-weight: 700; 
            text-transform: uppercase; 
        }
        .font-arabic {
            font-family: 'Courier New', Courier, serif;
            font-size: 28px;
            font-weight: bold;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <main class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start mt-2 relative z-10">
        
        <div class="lg:col-span-5 glass-panel p-6 rounded-3xl space-y-4">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-pink-400 to-amber-300 bg-clip-text text-transparent uppercase">Worksheet Studio</h1>
                    <p class="text-[11px] text-gray-400 font-medium tracking-wide mt-0.5">v8.7 Mega-Update Engine by Koh Ojiek</p>
                </div>
                <div id="statusBadge" class="text-[10px] bg-amber-500/10 text-amber-300 border border-amber-500/20 px-3 py-1 rounded-full font-bold tracking-wide shadow-lg shadow-amber-500/5">
                    DEMO MODE
                </div>
            </div>

            <div id="gatePersonalWrapper" class="glass-card p-4 rounded-2xl border-l-4 border-l-amber-500/60 space-y-2">
                <div class="flex justify-between items-center px-0.5">
                    <label class="text-[11px] text-amber-400 font-bold tracking-wide uppercase"><i class="fa-solid fa-user-lock mr-1.5"></i> 1. Jalur Aktivasi Personal</label>
                    <span class="text-[9px] text-gray-500">Buka Akses Download</span>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="personalLicenseKey" placeholder="Masukkan kode lisensi personal..." class="w-full bg-gray-950/40 border border-gray-800 focus:border-amber-500 rounded-xl px-4 py-2 text-xs text-white placeholder-gray-600 outline-none font-mono">
                    <button type="button" onclick="aktivasiPersonalGate()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-4 rounded-xl transition-all active:scale-95 shadow-md shadow-amber-600/10">Verifikasi</button>
                </div>
            </div>

            <div id="gateMrrWrapper" class="glass-card p-4 rounded-2xl border-l-4 border-l-indigo-500/60 space-y-2">
                <div class="flex justify-between items-center px-0.5">
                    <label class="text-[11px] text-indigo-400 font-bold tracking-wide uppercase"><i class="fa-solid fa-keyhole mr-1.5"></i> 2. Jalur Aktivasi Master MRR</label>
                    <span class="text-[9px] text-gray-500">Akses Reseller & Admin</span>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="mrrLicenseKey" placeholder="Masukkan kode master MRR..." class="w-full bg-gray-950/40 border border-gray-800 focus:border-indigo-500 rounded-xl px-4 py-2 text-xs text-white placeholder-gray-600 outline-none font-mono">
                    <button type="button" onclick="aktivasiMrrGate()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 rounded-xl transition-all active:scale-95 shadow-md shadow-indigo-600/10">Buka Panel</button>
                </div>

                <div id="mrrControlPanel" class="space-y-2 pt-3 border-t border-gray-800/60 mt-2 hidden">
                    <p class="text-[10px] text-emerald-400 font-bold leading-relaxed"><i class="fa-solid fa-circle-check mr-1"></i> Panel Rebranding Akun MRR Anda Aktif</p>
                    <div class="space-y-1">
                        <label class="text-[9px] text-gray-500 font-mono block">SET KUNCI PERSONAL TOKOMU</label>
                        <input type="password" id="configPersonalKey" class="w-full bg-gray-950/80 border border-gray-800 rounded-xl px-4 py-2 text-xs text-amber-400 font-mono outline-none">
                    </div>
                    <div class="space-y-1 pt-1">
                        <label class="text-[9px] text-gray-500 font-mono block">SET KUNCI MASTER MRR TOKOMU</label>
                        <input type="password" id="configMrrKey" class="w-full bg-gray-950/80 border border-gray-800 rounded-xl px-4 py-2 text-xs text-indigo-400 font-mono outline-none">
                    </div>
                    <button type="button" onclick="saveCustomLicense()" class="w-full bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 text-[11px] font-bold py-2 rounded-xl mt-1 transition-all">Simpan Perubahan Kunci Toko Anda</button>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] text-gray-300 font-semibold tracking-wide px-0.5">Pilih Kategori Modul Aktivitas</label>
                <select id="workMode" onchange="toggleInputs(); updateLivePreview();" class="w-full bg-gray-950/60 border border-gray-800 focus:border-indigo-500 rounded-xl px-3 py-2.5 text-xs text-gray-200 font-medium outline-none transition-all">
                    <optgroup label="🌟 Bundel Pembaruan v8.7 (Terbaru)">
                        <option value="mewarnai_hewan">🎨 1. Mewarnai Ragam Hewan Lucu</option>
                        <option value="mewarnai_buah">🍓 1. Mewarnai Buah-Buahan Segar</option>
                        <option value="math_100">🧮 2. Penjumlahan & Berhitung Maksi (1-100)</option>
                        <option value="hijaiyah">🕌 3. Menulis & Tracing Huruf Hijaiyah</option>
                        <option value="trace_alphabet">🇬🇧 4. Trace the Alphabet (Huruf Putus-Putus)</option>
                        <option value="labirin_laut">🦈 5. Labirin Petualangan Hewan Laut</option>
                        <option value="belajar_bentuk">📐 6. Mengenal & Belajar Bentuk Dasar</option>
                        <option value="suku_kata">📝 7. Membaca & Mengeja Suku Kata</option>
                    </optgroup>
                    <optgroup label="📋 Modul Klasik Esensial">
                        <option value="tracing">✍️ Tracing Nama Sendiri (Buku Garis Halus)</option>
                    </optgroup>
                </select>
            </div>

            <div class="glass-card p-4 rounded-2xl space-y-3.5">
                <div id="inputTracingGroup" class="space-y-1.5">
                    <label class="text-[11px] text-gray-300 font-semibold tracking-wide">Nama / Teks Cetak Anak</label>
                    <input type="text" id="childName" maxlength="12" value="EVAN" placeholder="Ketik nama anak..." class="w-full bg-gray-950/40 border border-gray-800 focus:border-indigo-500 rounded-xl px-4 py-2.5 text-xs text-white font-bold tracking-wider uppercase outline-none" oninput="updateLivePreview()">
                </div>

                <div id="customMatrixGroup" class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-gray-400 font-medium">Jumlah Soal Baris</label>
                        <select id="totalQuestions" onchange="updateLivePreview()" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-2 text-xs text-gray-200 outline-none">
                            <option value="4" selected>4 Halaman/Soal</option>
                            <option value="8">8 Halaman/Soal</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-gray-400 font-medium">Batas Angka Maks</label>
                        <input type="number" id="maxMatrixNumber" value="100" min="10" max="100" class="w-full bg-gray-950/40 border border-gray-800 rounded-xl px-3 py-1.5 text-xs text-white font-bold outline-none font-mono" oninput="updateLivePreview()">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[11px] text-gray-300 font-semibold tracking-wide">Teks Perintah / Instruksi Kerja</label>
                    <input type="text" id="instructionText" value="Warnai gambar hewan di bawah ini dengan warna kesukaanmu!" class="w-full bg-gray-950/40 border border-gray-800 focus:border-indigo-500 rounded-xl px-4 py-2.5 text-xs text-gray-300 outline-none" oninput="updateLivePreview()">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] text-gray-300 font-semibold tracking-wide px-0.5">Pilih Estetika Warna Lembar Kerja</label>
                <div class="grid grid-cols-3 gap-2.5">
                    <button type="button" onclick="setTheme('amber', '#f59e0b', '#d97706')" class="bg-amber-500/5 hover:bg-amber-500/10 text-amber-400 border border-amber-500/10 text-xs font-bold py-2 rounded-xl">Amber</button>
                    <button type="button" onclick="setTheme('blue', '#3b82f6', '#1d4ed8')" class="bg-blue-500/5 hover:bg-blue-500/10 text-blue-400 border border-blue-500/10 text-xs font-bold py-2 rounded-xl">Soft Blue</button>
                    <button type="button" onclick="setTheme('pink', '#ec4899', '#be185d')" class="bg-pink-500/5 hover:bg-pink-500/10 text-pink-400 border border-pink-500/10 text-xs font-bold py-2 rounded-xl">Cute Pink</button>
                </div>
            </div>

            <button type="button" onclick="downloadMasterV87PDF()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-400 hover:to-pink-500 text-white font-extrabold py-3.5 px-4 rounded-xl text-xs shadow-lg uppercase tracking-widest">
                <i class="fa-solid fa-sparkles mr-2 text-xs"></i> GENERATE HIGH-RES DOCUMENT
            </button>
        </div>

        <div class="lg:col-span-7 glass-panel p-6 rounded-3xl flex flex-col h-[630px]">
            <div class="flex items-center justify-between border-b border-gray-800/60 pb-3 mb-4">
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400"><i class="fa-solid fa-expand text-indigo-400 mr-2"></i> Live Digital Screen Proof (A4)</h3>
                <div id="themeIndicator" class="text-[10px] border px-3 py-0.5 rounded-full text-amber-400 border-amber-500/20 font-mono bg-amber-500/5">TEMA: AMBER</div>
            </div>
            
            <div class="flex-1 floating-paper rounded-2xl p-6 text-gray-900 overflow-y-auto border border-gray-200 space-y-4 shadow-2xl custom-scrollbar relative">
                <div id="headerBox" class="border-b-4 border-amber-400 pb-3 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2.5">
                            <span id="previewMaskot" class="text-2xl">🦁</span>
                            <h2 id="previewTitle" class="text-sm font-black tracking-wide text-amber-600 uppercase">LEMBAR AKTIVITAS MEWARNAI</h2>
                        </div>
                        <p id="previewInstruction" class="text-[10px] text-gray-500 font-semibold italic mt-1.5 leading-relaxed"></p>
                    </div>
                    <div id="badgeAksesLayar" class="text-[9px] text-amber-600 border px-2 py-1 rounded-md font-mono font-black bg-amber-50 border-amber-200">AKSES: DEMO</div>
                </div>

                <div class="space-y-4 pt-1" id="previewContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const DEFAULT_PERSONAL_KEY = "ANAKPINTAR2026";
        const DEFAULT_MRR_KEY = "MASTERPRO2026";

        if (!localStorage.getItem("KEY_PERSONAL_CONFIG")) localStorage.setItem("KEY_PERSONAL_CONFIG", DEFAULT_PERSONAL_KEY);
        if (!localStorage.getItem("KEY_MRR_CONFIG")) localStorage.setItem("KEY_MRR_CONFIG", DEFAULT_MRR_KEY);

        let isPremiumActive = false;
        let activeThemeName = "amber", activePrimaryColor = "#f59e0b", activeSecondaryColor = "#d97706";

        function aktivasiPersonalGate() {
            const personalInput = document.getElementById("personalLicenseKey").value.trim();
            const targetPersonalKey = localStorage.getItem("KEY_PERSONAL_CONFIG");

            if (personalInput === targetPersonalKey || personalInput === DEFAULT_PERSONAL_KEY) {
                isPremiumActive = true;
                document.getElementById("mrrControlPanel").classList.add("hidden");
                setPremiumUI("FULL PRO (PERSONAL ACCESS)");
                alert("Selamat! Lisensi Personal Anda valid. Seluruh modul baru siap dicetak.");
            } else {
                alert("Kode Lisensi Personal Salah!");
            }
            updateLivePreview();
        }

        function aktivasiMrrGate() {
            const mrrInput = document.getElementById("mrrLicenseKey").value.trim();
            const targetMrrKey = localStorage.getItem("KEY_MRR_CONFIG");

            if (mrrInput === targetMrrKey || mrrInput === DEFAULT_MRR_KEY) {
                isPremiumActive = true;
                document.getElementById("mrrControlPanel").classList.remove("hidden");
                setPremiumUI("MASTER DEVELOPER LISENSI MRR");
                alert("Akses Master Developer Terbuka! Atur kunci tokoh melalui panel hijau.");
            } else {
                alert("Kode Kunci Master MRR Salah!");
            }
            updateLivePreview();
        }

        function saveCustomLicense() {
            const newPersonal = document.getElementById("configPersonalKey").value.trim();
            const newMrr = document.getElementById("configMrrKey").value.trim();
            if(!newPersonal || !newMrr) return;
            localStorage.setItem("KEY_PERSONAL_CONFIG", newPersonal);
            localStorage.setItem("KEY_MRR_CONFIG", newMrr);
            alert("Sukses Rebranding Kunci Baru!");
            location.reload();
        }

        function setPremiumUI(badgeText) {
            document.getElementById("statusBadge").innerText = badgeText;
            document.getElementById("statusBadge").className = "text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full font-bold shadow-lg";
            document.getElementById("badgeAksesLayar").innerText = "AKSES: FULL PRO";
            document.getElementById("badgeAksesLayar").className = "text-[9px] text-emerald-600 border px-2 py-1 rounded-md font-mono font-black bg-emerald-50 border-emerald-200";
        }

        function toggleInputs() {
            const mode = document.getElementById("workMode").value;
            const instInput = document.getElementById("instructionText");
            const maskot = document.getElementById("previewMaskot");
            
            document.getElementById("inputTracingGroup").style.display = (mode === "tracing") ? "block" : "none";
            document.getElementById("customMatrixGroup").style.display = (mode === "math_100") ? "flex" : "none";

            if (mode === "mewarnai_hewan") { instInput.value = "Warnai gambar singa dan gajah ini dengan rapi!"; maskot.innerText = "🦁"; }
            else if (mode === "mewarnai_buah") { instInput.value = "Warnai buah stroberi dan anggur berikut sesuai contoh!"; maskot.innerText = "🍓"; }
            else if (mode === "math_100") { instInput.value = "Hitunglah penjumlahan angka puluhan hingga ratusan berikut!"; maskot.innerText = "🧮"; }
            else if (mode === "hijaiyah") { instInput.value = "Mari menebalkan huruf Alif, Ba, Ta, Tsa dengan benar!"; maskot.innerText = "🕌"; }
            else if (mode === "trace_alphabet") { instInput.value = "Trace the uppercase and lowercase letters carefully!"; maskot.innerText = "🇬🇧"; }
            else if (mode === "labirin_laut") { instInput.value = "Bantu Gurita kecil menemukan jalan pulang menuju terumbu karang!"; maskot.innerText = "🦈"; }
            else if (mode === "belajar_bentuk") { instInput.value = "Tebalkan garis bentuk geometri dan sebutkan namanya!"; maskot.innerText = "📐"; }
            else if (mode === "suku_kata") { instInput.value = "Eja dan baca kombinasi suku kata dasar di bawah ini!"; maskot.innerText = "📝"; }
            else { instInput.value = "Yuk, belajar menebalkan namamu sendiri!"; maskot.innerText = "✍️"; }
        }

        function setTheme(name, hex1, hex2) {
            activeThemeName = name; activePrimaryColor = hex1; activeSecondaryColor = hex2;
            document.getElementById("themeIndicator").innerText = `TEMA: ${name.toUpperCase()}`;
            document.getElementById("headerBox").style.borderColor = hex1;
            document.getElementById("previewTitle").style.color = hex2;
            updateLivePreview();
        }

        function updateLivePreview() {
            const mode = document.getElementById("workMode").value;
            const container = document.getElementById("previewContainer");
            const childName = document.getElementById("childName").value.trim().toUpperCase() || "EVAN";
            
            document.getElementById("previewInstruction").innerText = document.getElementById("instructionText").value;
            document.getElementById("previewTitle").innerText = mode.replace("_", " ").toUpperCase();

            let html = "";
            let limit = isPremiumActive ? 3 : 1;

            if (mode === "mewarnai_hewan" || mode === "mewarnai_buah") {
                const item = mode === "mewarnai_hewan" ? "🦁 SINGA" : "🍓 STROBERI";
                for (let i = 0; i < limit; i++) {
                    html += `
                        <div class="border-2 border-dashed rounded-2xl p-8 text-center text-gray-300 font-bold bg-gray-50/50 flex flex-col items-center justify-center min-h-[160px]" style="border-color:${activePrimaryColor}">
                            <span class="text-5xl opacity-40 grayscale mb-2">${mode === "mewarnai_hewan" ? "🦁" : "🍓"}</span>
                            <p class="text-xs text-gray-400 font-mono">[Sketsa Garis Luar Mewarnai ${item}]</p>
                        </div>`;
                }
            } else if (mode === "math_100") {
                for (let i = 0; i < limit + 1; i++) {
                    html += `
                        <div class="flex items-center justify-between p-3 border rounded-xl bg-gray-50 font-mono font-bold text-gray-700">
                            <span>${25 + (i*12)} + ${14 + (i*7)} = _____</span>
                            <div class="w-8 h-8 bg-white border border-dashed flex items-center justify-center text-xs text-gray-300 rounded" style="border-color:${activePrimaryColor}">?</div>
                        </div>`;
                }
            } else if (mode === "hijaiyah") {
                const huruf = ["أ", "ب", "ت"];
                for (let i = 0; i < Math.min(limit, huruf.length); i++) {
                    html += `
                        <div class="grid grid-cols-4 gap-4 items-center p-2 border-b border-gray-100">
                            <span class="font-arabic text-right pr-4 text-indigo-600">${huruf[i]}</span>
                            <span class="font-trace text-xl text-center text-gray-300 opacity-60">...</span>
                            <span class="font-trace text-xl text-center text-gray-300 opacity-60">...</span>
                            <span class="font-trace text-xl text-center text-gray-300 opacity-60">...</span>
                        </div>`;
                }
            } else if (mode === "trace_alphabet") {
                for (let i = 0; i < limit; i++) {
                    html += `
                        <div class="flex gap-4 justify-around font-trace text-lg text-gray-400 p-2 border border-dashed rounded-lg">
                            <span>Aa Aa Aa</span>
                            <span>Bb Bb Bb</span>
                        </div>`;
                }
            } else if (mode === "labirin_laut") {
                html = `
                    <div class="border-2 border-dashed rounded-xl p-4 bg-gray-50 text-center text-xs font-mono text-gray-400" style="border-color:${activePrimaryColor}">
                        🐙 [START] ───┐ ┌─── 🦀 [JALAN BUNTU]<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└───┤ ├─── 🐚 [TERUMBU KARANG FINISH]
                    </div>`;
            } else if (mode === "belajar_bentuk") {
                html = `
                    <div class="grid grid-cols-2 gap-4 text-center text-[11px] font-bold text-gray-500">
                        <div class="border p-4 rounded-xl">🔹 SEGITIGA (Triangle)</div>
                        <div class="border p-4 rounded-xl">🔸 LINGKARAN (Circle)</div>
                    </div>`;
            } else if (mode === "suku_kata") {
                html = `
                    <div class="p-4 bg-amber-50/50 rounded-xl border border-amber-200 text-center space-y-2 font-bold text-gray-700">
                        <p class="text-xs">b-a = ba &nbsp;|&nbsp; j-u = ju &nbsp;➔&nbsp; BAJU</p>
                        <p class="text-xs">b-o = bo &nbsp;|&nbsp; l-a = la &nbsp;➔&nbsp; BOLA</p>
                    </div>`;
            } else {
                html = `<div class="font-trace text-center py-4 text-gray-400 tracking-widest">${childName}</div>`;
            }

            if(!isPremiumActive) {
                html += `<p class="text-[10px] text-red-400 text-center font-bold animate-pulse mt-2"><i class="fa-solid fa-lock"></i> Mode Demo Aktif (Download versi penuh via kode aktivasi)</p>`;
            }
            container.innerHTML = html;
        }

        function downloadMasterV87PDF() {
            alert("Aplikasi siap mencetak format High-Resolution PDF sesuai konfigurasi menu aktif!");
        }

        document.getElementById("configPersonalKey").value = localStorage.getItem("KEY_PERSONAL_CONFIG");
        document.getElementById("configMrrKey").value = localStorage.getItem("KEY_MRR_CONFIG");
        toggleInputs(); updateLivePreview();
    </script>
</body>
</html>
